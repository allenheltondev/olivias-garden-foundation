AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Store API and frontend for Olivia's Garden Foundation merchandise + donations

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string (shared with grn-api / admin-api)
  EnvironmentName:
    Type: String
    Default: staging
    AllowedValues:
      - dev
      - staging
      - prod
      - pr
  DomainName:
    Type: String
    Default: ""
    Description: Optional root domain name used for store frontend and shared API base path
  DomainHostedZoneId:
    Type: String
    Default: ""
    Description: Optional Route 53 hosted zone id for custom store frontend DNS
  DomainProtocol:
    Type: String
    Default: https
    AllowedValues: ["https", "http"]
  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe secret key (live or test). Required for checkout sessions.
  StripeEventBusName:
    Type: String
    Default: ""
    Description: >
      Stripe partner integration EventBridge bus name (e.g.
      aws.partner/stripe.com/...). When set, the store API subscribes a
      Lambda consumer to record paid orders from the bus.
  AllowedCheckoutRedirectOrigins:
    Type: String
    Default: ""
    Description: >
      Optional comma-separated list of origins allowed for Stripe Checkout
      success_url and cancel_url. Defaults to the store frontend origin plus
      localhost dev fallbacks if left blank.

Conditions:
  DeployFrontendCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref DomainHostedZoneId, ""]]
  DeploySharedApiBasePathMapping: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref DomainHostedZoneId, ""]]
  HasStripeEventBus: !Not [!Equals [!Ref StripeEventBusName, ""]]

Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: !If
        - DeployFrontendCustomDomain
        - !Sub "'${DomainProtocol}://store.${DomainName}'"
        - "'*'"
  Function:
    Architectures: [arm64]
    Tracing: Disabled
    Timeout: 10
    MemorySize: 1024
    Environment:
      Variables:
        POWERTOOLS_LOG_LEVEL: DEBUG
        NODE_OPTIONS: --enable-source-maps

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2022
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "Olivia's Garden Foundation Store API (${EnvironmentName})"
      TracingEnabled: false
      StageName: api
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: !If
          - DeployFrontendCustomDomain
          - !Sub "'${DomainProtocol}://store.${DomainName}'"
          - "'*'"
      # The store mixes anonymous (browse, checkout, lookup-by-session) and
      # authenticated (My orders, admin) routes, so following the web-api
      # pattern: no API-level authorizer. Each handler resolves the bearer
      # token in-process via resolveOptionalAuthContext / requireUserContext
      # / requireAdminContext from src/services/auth.mjs.
      MethodSettings:
        - MetricsEnabled: true
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: ERROR
          DataTraceEnabled: true

  SharedApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeploySharedApiBasePathMapping
    DependsOn:
      - ApiapiStage
    Properties:
      DomainName: !Sub "api.${DomainName}"
      RestApiId: !Ref Api
      Stage: api
      BasePath: store

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  StoreSourceMapsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldSourceMaps
            Status: Enabled
            ExpirationInDays: 90
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  StoreRumIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub "${AWS::StackName}-store-rum"
      AllowUnauthenticatedIdentities: true

  StoreRumUnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action:
              - sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref StoreRumIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: PutStoreRumEvents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rum:PutRumEvents
                Resource: !Sub "arn:${AWS::Partition}:rum:${AWS::Region}:${AWS::AccountId}:appmonitor/${AWS::StackName}-store-rum"

  StoreRumIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref StoreRumIdentityPool
      Roles:
        unauthenticated: !GetAtt StoreRumUnauthenticatedRole.Arn

  StoreRumLogDeliveryPolicy:
    Type: AWS::Logs::ResourcePolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-store-rum-log-delivery"
      PolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "AWSLogDeliveryWrite20150319",
              "Effect": "Allow",
              "Principal": {
                "Service": "delivery.logs.amazonaws.com"
              },
              "Action": [
                "logs:CreateLogStream",
                "logs:PutLogEvents"
              ],
              "Resource": "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vendedlogs/RUMService_${AWS::StackName}-store-rum*:*",
              "Condition": {
                "StringEquals": {
                  "aws:SourceAccount": "${AWS::AccountId}"
                },
                "ArnLike": {
                  "aws:SourceArn": "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
                }
              }
            }
          ]
        }

  StoreRumAppMonitor:
    Type: AWS::RUM::AppMonitor
    DependsOn:
      - StoreRumLogDeliveryPolicy
    Properties:
      Name: !Sub "${AWS::StackName}-store-rum"
      Domain: !If
        - DeployFrontendCustomDomain
        - !Sub "store.${DomainName}"
        - !GetAtt FrontendDistribution.DomainName
      CwLogEnabled: true
      AppMonitorConfiguration:
        AllowCookies: false
        EnableXRay: false
        GuestRoleArn: !GetAtt StoreRumUnauthenticatedRole.Arn
        IdentityPoolId: !Ref StoreRumIdentityPool
        SessionSampleRate: 1
        Telemetries:
          - performance
          - errors
          - http
      DeobfuscationConfiguration:
        JavaScriptSourceMaps:
          Status: ENABLED
          S3Uri: !Sub "s3://${StoreSourceMapsBucket}"

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt FrontendBucket.Arn
              - !Sub "${FrontendBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": false

  StoreSourceMapsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StoreSourceMapsBucket
      PolicyDocument:
        Statement:
          - Sid: AllowRumSourceMapList
            Effect: Allow
            Principal:
              Service: rum.amazonaws.com
            Action:
              - s3:ListBucket
            Resource: !GetAtt StoreSourceMapsBucket.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
                aws:SourceArn: !Sub "arn:${AWS::Partition}:rum:${AWS::Region}:${AWS::AccountId}:appmonitor/${AWS::StackName}-store-rum"
          - Sid: AllowRumSourceMapRead
            Effect: Allow
            Principal:
              Service: rum.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub "${StoreSourceMapsBucket.Arn}/*"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
                aws:SourceArn: !Sub "arn:${AWS::Partition}:rum:${AWS::Region}:${AWS::AccountId}:appmonitor/${AWS::StackName}-store-rum"
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt StoreSourceMapsBucket.Arn
              - !Sub "${StoreSourceMapsBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": false

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Aliases: !If
          - DeployFrontendCustomDomain
          - [!Sub "store.${DomainName}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployFrontendCustomDomain
          - AcmCertificateArn: !Ref FrontendCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: "67f7725c-6f97-4210-82d7-5512b31e9d03"
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

  FrontendCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployFrontendCustomDomain
    Properties:
      DomainName: !Sub "store.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "store.${DomainName}"
          HostedZoneId: !Ref DomainHostedZoneId

  FrontendDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployFrontendCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Sub "store.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - src/handlers/api.mjs
    Properties:
      CodeUri: .
      Handler: src/handlers/api.handler
      Runtime: nodejs24.x
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          ORIGIN: !If
            - DeployFrontendCustomDomain
            - !Sub "${DomainProtocol}://store.${DomainName}"
            - "*"
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          ALLOWED_CHECKOUT_REDIRECT_ORIGINS: !Ref AllowedCheckoutRedirectOrigins
          OGF_USER_POOL_ID: !ImportValue OGF-UserPoolId
          OGF_USER_POOL_CLIENT_ID: !ImportValue OGF-UserPoolClientId
          MEDIA_CDN_DOMAIN: !ImportValue OGF-AssetsPublicDomainName
          NODE_OPTIONS: --enable-source-maps
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: ANY

  # Subscribe to the Stripe partner integration event bus and record paid
  # orders. The same bus is consumed by web-api for donations; each
  # consumer filters by metadata.og_kind so the streams don't cross.
  StripeEventConsumerFunction:
    Type: AWS::Serverless::Function
    Condition: HasStripeEventBus
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - src/handlers/stripe-event-consumer.mjs
    Properties:
      CodeUri: .
      Handler: src/handlers/stripe-event-consumer.handler
      Runtime: nodejs24.x
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          NODE_OPTIONS: --enable-source-maps
      Events:
        StripeCheckoutEvents:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref StripeEventBusName
            Pattern:
              detail-type:
                - checkout.session.completed
                - checkout.session.async_payment_succeeded

Outputs:
  ApiUrl:
    Description: Store API endpoint URL
    Value: !If
      - DeploySharedApiBasePathMapping
      - !Sub "https://api.${DomainName}/store"
      - !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/api"

  FrontendUrl:
    Description: Store frontend URL
    Value: !If
      - DeployFrontendCustomDomain
      - !Sub "${DomainProtocol}://store.${DomainName}"
      - !Sub "https://${FrontendDistribution.DomainName}"

  FrontendBucket:
    Description: S3 bucket name for store frontend deployment
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID for store frontend cache invalidation
    Value: !Ref FrontendDistribution

  StoreSourceMapsBucketName:
    Description: Private S3 bucket that stores Store CloudWatch RUM JavaScript source maps.
    Value: !Ref StoreSourceMapsBucket

  StoreRumAppMonitorId:
    Description: CloudWatch RUM app monitor ID for the store frontend.
    Value: !GetAtt StoreRumAppMonitor.Id

  StoreRumAppMonitorName:
    Description: CloudWatch RUM app monitor name for the store frontend.
    Value: !Ref StoreRumAppMonitor

  StoreRumIdentityPoolId:
    Description: Cognito identity pool ID used by the Store CloudWatch RUM web client.
    Value: !Ref StoreRumIdentityPool

  StoreRumGuestRoleArn:
    Description: Unauthenticated Cognito role ARN used by the Store CloudWatch RUM web client.
    Value: !GetAtt StoreRumUnauthenticatedRole.Arn
