AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Store API and frontend for Olivia's Garden Foundation merchandise + donations

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string (shared with grn-api / admin-api)
  EnvironmentName:
    Type: String
    Default: staging
    AllowedValues:
      - dev
      - staging
      - prod
      - pr
  DomainName:
    Type: String
    Default: ""
    Description: Optional root domain name used for store frontend and shared API base path
  DomainHostedZoneId:
    Type: String
    Default: ""
    Description: Optional Route 53 hosted zone id for custom store frontend DNS
  DomainProtocol:
    Type: String
    Default: https
    AllowedValues: ["https", "http"]
  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe secret key (live or test). Required for checkout sessions.
  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe webhook signing secret (whsec_...). Required for /webhook.

Conditions:
  DeployFrontendCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref DomainHostedZoneId, ""]]
  DeploySharedApiBasePathMapping: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref DomainHostedZoneId, ""]]

Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,Stripe-Signature'"
      AllowOrigin: !If
        - DeployFrontendCustomDomain
        - !Sub "'${DomainProtocol}://store.${DomainName}'"
        - "'*'"
  Function:
    Architectures: [arm64]
    Tracing: Disabled
    Timeout: 10
    MemorySize: 1024
    Environment:
      Variables:
        POWERTOOLS_LOG_LEVEL: DEBUG
        NODE_OPTIONS: --enable-source-maps

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2022
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "Olivia's Garden Foundation Store API (${EnvironmentName})"
      TracingEnabled: false
      StageName: api
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,Stripe-Signature'"
        AllowOrigin: !If
          - DeployFrontendCustomDomain
          - !Sub "'${DomainProtocol}://store.${DomainName}'"
          - "'*'"
      BinaryMediaTypes:
        - "*/*"
      Auth:
        DefaultAuthorizer: LambdaAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          LambdaAuthorizer:
            FunctionPayloadType: REQUEST
            FunctionArn: !GetAtt LambdaAuthorizerFunction.Arn
            Identity:
              Headers:
                - Authorization
      MethodSettings:
        - MetricsEnabled: true
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: ERROR
          DataTraceEnabled: true

  SharedApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeploySharedApiBasePathMapping
    DependsOn:
      - ApiapiStage
    Properties:
      DomainName: !Sub "api.${DomainName}"
      RestApiId: !Ref Api
      Stage: api
      BasePath: store

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt FrontendBucket.Arn
              - !Sub "${FrontendBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": false

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Aliases: !If
          - DeployFrontendCustomDomain
          - [!Sub "store.${DomainName}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployFrontendCustomDomain
          - AcmCertificateArn: !Ref FrontendCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: "67f7725c-6f97-4210-82d7-5512b31e9d03"
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

  FrontendCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployFrontendCustomDomain
    Properties:
      DomainName: !Sub "store.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "store.${DomainName}"
          HostedZoneId: !Ref DomainHostedZoneId

  FrontendDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployFrontendCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Sub "store.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  LambdaAuthorizerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - src/auth/authorizer.mjs
    Properties:
      CodeUri: .
      Handler: src/auth/authorizer.handler
      Runtime: nodejs24.x
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          USER_POOL_ID: !ImportValue OGF-UserPoolId
          USER_POOL_CLIENT_ID: !ImportValue OGF-UserPoolClientId

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - src/handlers/api.mjs
    Properties:
      CodeUri: .
      Handler: src/handlers/api.handler
      Runtime: nodejs24.x
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          ORIGIN: !If
            - DeployFrontendCustomDomain
            - !Sub "${DomainProtocol}://store.${DomainName}"
            - "*"
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          NODE_OPTIONS: --enable-source-maps
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: Store API endpoint URL
    Value: !If
      - DeploySharedApiBasePathMapping
      - !Sub "https://api.${DomainName}/store"
      - !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/api"

  FrontendUrl:
    Description: Store frontend URL
    Value: !If
      - DeployFrontendCustomDomain
      - !Sub "${DomainProtocol}://store.${DomainName}"
      - !Sub "https://${FrontendDistribution.DomainName}"

  FrontendBucket:
    Description: S3 bucket name for store frontend deployment
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID for store frontend cache invalidation
    Value: !Ref FrontendDistribution

  StripeWebhookEndpoint:
    Description: Configure this URL in the Stripe dashboard for checkout.session.completed events
    Value: !If
      - DeploySharedApiBasePathMapping
      - !Sub "https://api.${DomainName}/store/webhook"
      - !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/api/webhook"
