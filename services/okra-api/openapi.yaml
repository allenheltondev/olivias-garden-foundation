openapi: 3.0.3
info:
  title: Okra API
  version: 0.1.0
  description: API contract for the Okra backend.
paths:
  /photos:
    post:
      operationId: createPhotoUploadIntent
      summary: Create temporary photo record and pre-signed upload URL
      tags:
        - media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contentType
              properties:
                contentType:
                  type: string
                  enum: [image/jpeg, image/png, image/webp]
                fileName:
                  type: string
      responses:
        '201':
          description: Upload intent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  photoId:
                    type: string
                  uploadUrl:
                    type: string
                  method:
                    type: string
                    example: PUT
                  headers:
                    type: object
                  bucket:
                    type: string
                  s3Key:
                    type: string
                  expiresInSeconds:
                    type: number
        '422':
          description: Validation error
        '429':
          description: Rate limit exceeded

  /requests:
    post:
      operationId: createSeedRequest
      summary: Create a free okra seed request (US/CA mail or in-person exchange)
      tags:
        - requests
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-generated UUID; repeat submissions with the same key within 24h return the cached result.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - fulfillmentMethod
              properties:
                name:
                  type: string
                  maxLength: 200
                email:
                  type: string
                  format: email
                fulfillmentMethod:
                  type: string
                  enum: [mail, in_person]
                  description: "\"mail\" requires shippingAddress (US or CA only); \"in_person\" uses optional visitDetails."
                shippingAddress:
                  type: object
                  required:
                    - line1
                    - city
                    - region
                    - postalCode
                    - country
                  properties:
                    line1:
                      type: string
                    line2:
                      type: string
                    city:
                      type: string
                    region:
                      type: string
                    postalCode:
                      type: string
                    country:
                      type: string
                      enum: [US, CA]
                visitDetails:
                  type: object
                  properties:
                    approximateDate:
                      type: string
                    notes:
                      type: string
                message:
                  type: string
                  maxLength: 2000
      responses:
        '201':
          description: Seed request recorded
          content:
            application/json:
              schema:
                type: object
                required:
                  - requestId
                  - createdAt
                properties:
                  requestId:
                    type: string
                    format: uuid
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Missing Idempotency-Key header
        '409':
          description: A request with this Idempotency-Key is already being processed
        '422':
          description: Validation error (e.g. unsupported shipping country)
        '429':
          description: Rate limit exceeded for this source IP

  /submissions:
    post:
      operationId: createSubmission
      summary: Create a pending submission for review and claim uploaded photos
      tags:
        - submissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rawLocationText
                - displayLat
                - displayLng
                - photoIds
              properties:
                contributorName:
                  type: string
                contributorEmail:
                  type: string
                storyText:
                  type: string
                rawLocationText:
                  type: string
                privacyMode:
                  type: string
                  enum: [exact, nearby, neighborhood, city]
                displayLat:
                  type: number
                displayLng:
                  type: number
                photoIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        '201':
          description: Submission created
          content:
            application/json:
              schema:
                type: object
                required:
                  - submissionId
                  - status
                properties:
                  submissionId:
                    type: string
                  status:
                    type: string
                    example: pending_review
                  createdAt:
                    type: string
        '422':
          description: Validation error

  /okra:
    get:
      operationId: getOkra
      summary: Get all approved submissions as map pins (replaces previous paginated behavior)
      tags:
        - map
      responses:
        '200':
          description: All approved pins with popup data
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=300, stale-while-revalidate=60"
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_count
                  - data
                properties:
                  total_count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MapPin'

  /okra/stats:
    get:
      operationId: getOkraStats
      summary: Get aggregate statistics for approved submissions
      tags:
        - map
      responses:
        '200':
          description: Community statistics
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=300, stale-while-revalidate=60"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkraStats'

  /admin/submissions:
    get:
      operationId: listAdminSubmissions
      summary: List submissions with cursor-based pagination
      tags:
        - admin
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            default: pending_review
            enum:
              - pending_review
              - approved
              - denied
          description: Filter submissions by status. Defaults to pending_review.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Page size (1-100). Values above 100 are clamped to 100.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor token from a previous response.
      responses:
        '200':
          description: Paginated list of submissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionListResponse'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/submissions/{id}/statuses:
    post:
      operationId: transitionSubmissionStatus
      summary: Transition a submission to approved or denied status
      tags:
        - admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Submission ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusTransitionRequestBody'
      responses:
        '200':
          description: Submission status transitioned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusTransitionResponse'
        '400':
          description: Validation error (INVALID_ACTION, INVALID_COORDINATES, INVALID_REASON, MISSING_NOTES, MISSING_PHOTOS)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Submission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Submission already reviewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    MapPin:
      type: object
      required:
        - id
        - display_lat
        - display_lng
        - photo_urls
      properties:
        id:
          type: string
          format: uuid
        display_lat:
          type: number
          format: double
        display_lng:
          type: number
          format: double
        contributor_name:
          type: string
          nullable: true
        story_text:
          type: string
          nullable: true
        photo_urls:
          type: array
          items:
            type: string
            format: uri

    OkraStats:
      type: object
      required:
        - total_pins
        - country_count
        - contributor_count
      properties:
        total_pins:
          type: integer
        country_count:
          type: integer
        contributor_count:
          type: integer

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: INVALID_STATUS
            message:
              type: string
              description: Human-readable error message
              example: Invalid status parameter

    SubmissionListItem:
      type: object
      required:
        - id
        - privacy_mode
        - status
        - created_at
        - photo_count
        - has_photos
        - photos
      properties:
        id:
          type: string
          format: uuid
        contributor_name:
          type: string
          nullable: true
        story_text:
          type: string
          nullable: true
        raw_location_text:
          type: string
          nullable: true
        privacy_mode:
          type: string
        display_lat:
          type: number
          format: double
          nullable: true
        display_lng:
          type: number
          format: double
          nullable: true
        status:
          type: string
          enum:
            - pending_review
            - approved
            - denied
        created_at:
          type: string
          format: date-time
        photo_count:
          type: integer
          description: Number of photos associated with this submission
        has_photos:
          type: boolean
          description: Whether the submission has at least one photo
        photos:
          type: array
          items:
            type: string
            format: uri
          description: Pre-signed S3 URLs for submission photos

    SubmissionListResponse:
      type: object
      required:
        - data
        - cursor
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SubmissionListItem'
        cursor:
          type: string
          nullable: true
          description: Opaque cursor token for the next page, or null if no more results

    Submission:
      type: object
      required:
        - id
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        contributor_name:
          type: string
          nullable: true
        story_text:
          type: string
          nullable: true
        raw_location_text:
          type: string
          nullable: true
        privacy_mode:
          type: string
        display_lat:
          type: number
          format: double
          nullable: true
        display_lng:
          type: number
          format: double
          nullable: true
        status:
          type: string
          enum:
            - pending_review
            - approved
            - denied
        review_notes:
          type: string
          nullable: true
        reviewed_by:
          type: string
          format: uuid
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    StatusTransitionRequestBody:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - approved
            - denied
          description: Target status for the submission
        review_notes:
          type: string
          description: Optional notes from the reviewer
        display_lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
          description: Override latitude for pin adjustment (approval only)
        display_lng:
          type: number
          format: double
          minimum: -180
          maximum: 180
          description: Override longitude for pin adjustment (approval only)
        reason:
          type: string
          enum:
            - spam
            - invalid_location
            - inappropriate
            - other
          description: Structured denial reason (required when status is denied)

    StatusTransitionResponse:
      allOf:
        - $ref: '#/components/schemas/Submission'
        - type: object
          properties:
            warnings:
              type: array
              items:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    example: SUSPICIOUS_COORDINATES
                  message:
                    type: string
                    example: "Coordinates are at 0,0 -- verify location is correct"

