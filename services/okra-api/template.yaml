AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Okra backend + media CDN (Node.js 24, SAM + esbuild)

Parameters:
  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection string (e.g., from Neon)
  CiAdminUsername:
    Type: String
    Default: ''
    Description: CI admin username for integration test auth token Lambda
  CiAdminPassword:
    Type: String
    Default: ''
    NoEcho: true
    Description: CI admin password for integration test auth token Lambda
  DomainName:
    Type: String
    Default: ''
    Description: Optional root domain name used to derive the shared API custom domain.
  SlackWebhookUrl:
    Type: String
    Default: ''
    NoEcho: true
    Description: General-purpose Slack incoming webhook used for Okra notifications (seed requests, submission reviews, etc.).

Conditions:
  DeploySharedApiBasePathMapping: !Not [!Equals [!Ref DomainName, '']]

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 1024
    # Architectures is set per-function below — SAM doesn't honor a
    # per-function override when the value is also set in Globals, so the
    # only way to have most functions on arm64 and the canvas-consuming
    # PhotoProcessorFunction on x86_64 is to omit it here and declare it
    # on every function explicitly.
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
        SHARED_USER_POOL_ID: !ImportValue OGF-UserPoolId
        SHARED_USER_POOL_CLIENT_ID: !ImportValue OGF-UserPoolClientId
        ADMIN_REQUIRED_GROUP: admin
        DATABASE_URL: !Ref DatabaseUrl
        MEDIA_BUCKET_NAME: !ImportValue OGF-AssetsBucketName
        PHOTO_PROCESSING_EVENT_BUS_NAME: default
        PHOTO_RATE_LIMIT_MAX_REQUESTS: '20'
        PHOTO_RATE_LIMIT_WINDOW_SECONDS: '3600'


Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

Resources:
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: "Okra Public API"
      TracingEnabled: true
      StageName: api
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  AdminApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: "Okra Admin API"
      TracingEnabled: true
      StageName: admin
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: AdminTokenAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          AdminTokenAuthorizer:
            FunctionArn: !GetAtt AdminAuthorizerFunction.Arn

  PhotoProcessorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ././src/handlers/photo-processor.mjs
        External:
          - '@napi-rs/canvas'
    Properties:
      CodeUri: ./
      Handler: src/handlers/photo-processor.handler
      Timeout: 60
      MemorySize: 1024
      # x86_64 because the napi-rs-canvas:888 layer only ships an x86_64
      # native binary. Rest of the stack stays arm64; see Globals comment.
      Architectures:
        - x86_64
      Layers:
        - arn:aws:lambda:us-east-1:205979422636:layer:napi-rs-canvas:888
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource:
                - !Sub
                  - '${SharedAssetsBucketArn}/*'
                  - SharedAssetsBucketArn: !ImportValue OGF-AssetsBucketArn
      Events:
        PhotoClaimedEvent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - okra.photos
              detail-type:
                - photo.claimed

  SeedRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requestId
          AttributeType: S
        - AttributeName: contributorCognitoSub
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: requestId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: contributorCognitoSub-createdAt-index
          KeySchema:
            - AttributeName: contributorCognitoSub
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  SubmissionNotifierFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ././src/handlers/submission-notifier.mjs
    Properties:
      CodeUri: ./
      Handler: src/handlers/submission-notifier.handler
      Architectures:
        - arm64
      Environment:
        Variables:
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          OKRA_ADMIN_FRONTEND_URL: !If
            - DeploySharedApiBasePathMapping
            - !Sub 'https://admin.${DomainName}'
            - ''
      Events:
        SubmissionCreatedEvent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - okra.submissions
              detail-type:
                - submission.created

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ././src/handlers/api.mjs
    Properties:
      CodeUri: ./
      Handler: src/handlers/api.handler
      Architectures:
        - arm64
      Environment:
        Variables:
          MEDIA_CDN_DOMAIN: !ImportValue OGF-AssetsPublicDomainName
          SEED_REQUESTS_TABLE_NAME: !Ref SeedRequestsTable
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          SEED_REQUEST_RATE_LIMIT_MAX: '5'
          SEED_REQUEST_RATE_LIMIT_WINDOW_SECONDS: '3600'
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default'
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub
                - '${SharedAssetsBucketArn}/temp-photos/*'
                - SharedAssetsBucketArn: !ImportValue OGF-AssetsBucketArn
            - Effect: Allow
              Action:
                - cognito-idp:GetUser
              Resource: '*'
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
              Resource:
                - !GetAtt SeedRequestsTable.Arn
                - !Sub '${SeedRequestsTable.Arn}/index/*'
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /
            Method: ANY

  AdminAuthorizerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ././src/handlers/admin-authorizer.mjs
    Properties:
      CodeUri: ./
      Handler: src/handlers/admin-authorizer.handler
      Architectures:
        - arm64
      Timeout: 5
      MemorySize: 256

  AdminApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ././src/handlers/admin-api.mjs
    Properties:
      CodeUri: ./
      Handler: src/handlers/admin-api.handler
      Architectures:
        - arm64
      Environment:
        Variables:
          SEED_REQUESTS_TABLE_NAME: !Ref SeedRequestsTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub
                - '${SharedAssetsBucketArn}/*'
                - SharedAssetsBucketArn: !ImportValue OGF-AssetsBucketArn
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default'
            - Effect: Allow
              Action:
                - dynamodb:Scan
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt SeedRequestsTable.Arn
                - !Sub '${SeedRequestsTable.Arn}/index/*'
            - Effect: Allow
              Action:
                - cognito-idp:DescribeUserPool
              Resource: !Sub
                - 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}'
                - UserPoolId: !ImportValue OGF-UserPoolId
      Events:
        AdminApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref AdminApiGateway
            Path: /{proxy+}
            Method: ANY
        AdminApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref AdminApiGateway
            Path: /
            Method: ANY

  DeniedPhotoCleanupFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ././src/handlers/denied-photo-cleanup.mjs
    Properties:
      CodeUri: ./
      Handler: src/handlers/denied-photo-cleanup.handler
      Architectures:
        - arm64
      Timeout: 60
      Events:
        SubmissionDeniedEvent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - "okra.api"
              detail-type:
                - "SubmissionDenied"
      Policies:
        - S3CrudPolicy:
            BucketName: !ImportValue OGF-AssetsBucketName
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl

  SharedApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeploySharedApiBasePathMapping
    Properties:
      DomainName: !Sub 'api.${DomainName}'
      RestApiId: !Ref ApiGateway
      Stage: api
      BasePath: okra

  SharedAdminApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeploySharedApiBasePathMapping
    Properties:
      DomainName: !Sub 'api.${DomainName}'
      RestApiId: !Ref AdminApiGateway
      Stage: admin
      BasePath: okra-admin

  AdminUserPoolGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !ImportValue OGF-UserPoolId
      Description: Admin group for authenticated admin API access

  CiAuthTokenFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ././src/handlers/ci-auth-token.mjs
    Properties:
      CodeUri: ./
      Handler: src/handlers/ci-auth-token.handler
      Architectures:
        - arm64
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          CI_ADMIN_USERNAME: !Ref CiAdminUsername
          CI_ADMIN_PASSWORD: !Ref CiAdminPassword
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:InitiateAuth
              Resource: !Sub
                - 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}'
                - UserPoolId: !ImportValue OGF-UserPoolId

Outputs:
  HttpApiUrl:
    Description: Base URL for the HTTP API
    Value: !If
      - DeploySharedApiBasePathMapping
      - !Sub
        - 'https://api.${RootDomainName}/okra'
        - RootDomainName: !Ref DomainName
      - !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/api'
  AdminApiUrl:
    Description: Base URL for the Admin API
    Value: !If
      - DeploySharedApiBasePathMapping
      - !Sub
        - 'https://api.${RootDomainName}/okra-admin'
        - RootDomainName: !Ref DomainName
      - !Sub 'https://${AdminApiGateway}.execute-api.${AWS::Region}.amazonaws.com/admin'
  PhotoProcessingEventBusName:
    Description: EventBridge bus used for claimed-photo processing events
    Value: default
  CiAuthTokenFunctionName:
    Description: Lambda function name for CI auth token generation
    Value: !Ref CiAuthTokenFunction
