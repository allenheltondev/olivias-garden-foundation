GrowerCropItem:
  type: object
  description: |
    Grower crop-library record.

    This endpoint currently returns snake_case fields. `crop_id` is a backward-compatible
    alias of `canonical_id` and will be present with the same value when the crop is linked
    to the public catalog.
  required: [id, user_id, crop_name, status, visibility, surplus_enabled, created_at, updated_at]
  properties:
    id:
      type: string
      format: uuid
    user_id:
      type: string
      format: uuid
    crop_id:
      type: string
      format: uuid
      nullable: true
      deprecated: true
      description: "Backward-compatible alias of canonical_id"
    canonical_id:
      type: string
      format: uuid
      nullable: true
      description: "Links to catalog crop when available, null for user-defined crops"
    crop_name:
      type: string
      description: "User-defined crop name or catalog crop name"
    variety_id:
      type: string
      format: uuid
      nullable: true
    status:
      type: string
      enum: [interested, planning, growing, paused]
    visibility:
      type: string
      enum: [private, local, public]
    surplus_enabled:
      type: boolean
    nickname:
      type: string
      nullable: true
    default_unit:
      type: string
      nullable: true
    notes:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

UpsertGrowerCropRequest:
  type: object
  description: |
    Create or update a grower crop-library record.

    The request is valid when either `canonical_id` or `crop_name` is provided.
    The API also accepts the compatibility aliases `canonicalId`, `crop_id`, `cropId`,
    `cropName`, `surplusEnabled`, and `defaultUnit`.
  required: [status, visibility, surplus_enabled]
  anyOf:
    - required: [canonical_id]
    - required: [crop_name]
  properties:
    canonical_id:
      type: string
      format: uuid
      nullable: true
      description: "Optional link to catalog crop"
    crop_name:
      type: string
      description: "The crop name to display and use for this entry"
    variety_id:
      type: string
      format: uuid
      nullable: true
    status:
      type: string
      enum: [interested, planning, growing, paused]
    visibility:
      type: string
      enum: [private, local, public]
    surplus_enabled:
      type: boolean
    nickname:
      type: string
      nullable: true
    default_unit:
      type: string
      nullable: true
    notes:
      type: string
      nullable: true
