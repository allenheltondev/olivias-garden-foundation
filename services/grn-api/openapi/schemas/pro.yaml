WeeklyPlanRequest:
  type: object
  required: [geoKey]
  properties:
    geoKey:
      type: string
      minLength: 4
    windowDays:
      type: integer
      enum: [7, 14, 30]
      default: 7

WeeklyPlanResponse:
  type: object
  required: [modelId, modelVersion, structuredJson, geoKey, windowDays, recommendations]
  properties:
    modelId:
      type: string
    modelVersion:
      type: string
    structuredJson:
      type: boolean
    geoKey:
      type: string
    windowDays:
      type: integer
    recommendations:
      type: array
      items:
        $ref: '#/WeeklyPlanRecommendation'

WeeklyPlanRecommendation:
  type: object
  required: [recommendation, confidence, rationale]
  properties:
    recommendation:
      type: string
    confidence:
      type: number
      format: double
      minimum: 0
      maximum: 1
    rationale:
      type: array
      items:
        type: string

CreateAgentTaskRequest:
  type: object
  required: [name, scheduleCron, instruction]
  properties:
    name:
      type: string
    scheduleCron:
      type: string
    instruction:
      type: string

UpdateAgentTaskStatusRequest:
  type: object
  required: [status]
  properties:
    status:
      type: string
      enum: [active, paused]

AgentTaskResponse:
  type: object
  required: [id, name, scheduleCron, instruction, status, createdAt]
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    scheduleCron:
      type: string
    instruction:
      type: string
    status:
      type: string
      enum: [active, paused]
    lastRunAt:
      type: string
      format: date-time
      nullable: true
    nextRunAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time

AgentTaskListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/AgentTaskResponse'

TrackEventRequest:
  type: object
  required: [eventName]
  properties:
    eventName:
      type: string
      enum: [paywall_view, checkout_start, subscribe, cancel]
    metadata:
      type: object
      additionalProperties: true
      nullable: true

ProKpiResponse:
  type: object
  required: [windowDays, funnel, conversionRate]
  properties:
    windowDays:
      type: integer
    funnel:
      type: object
      additionalProperties:
        type: integer
    conversionRate:
      type: number
      format: double
