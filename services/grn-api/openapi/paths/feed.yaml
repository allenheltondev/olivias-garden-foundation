/feed/derived:
  get:
    tags: [Feed, Idempotent]
    summary: Get derived feed with signals, AI summary, and guidance
    operationId: getDerivedFeed
    parameters:
      - in: query
        name: geoKey
        required: true
        schema:
          type: string
      - in: query
        name: windowDays
        schema:
          type: integer
          enum: [7, 14, 30]
          default: 7
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
          default: 0
    responses:
      '200':
        description: Derived feed
        content:
          application/json:
            schema:
              $ref: '../schemas/feed.yaml#/DerivedFeedResponse'
      '400':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
      '500':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
