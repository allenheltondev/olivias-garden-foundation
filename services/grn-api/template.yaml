AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Core services for Good Roots Network

Parameters:
  DomainProtocol:
    Type: String
    Default: https
    AllowedValues: ["https", "http"]
  DomainHostedZoneId:
    Type: String
    Default: ""
    Description: Route 53 Hosted Zone Id for the front end custom domain
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string for Neon database
  EnvironmentName:
    Type: String
    Default: staging
    AllowedValues:
      - dev
      - staging
      - prod
      - pr
    Description: Deployment environment name used for environment-specific resources
  DomainName:
    Type: String
    Default: ""
    Description: Optional root domain name used to derive the GRN frontend and shared API custom domain
  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Stripe secret key for subscription and store operations
  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Stripe webhook signing secret
  StripeProPriceId:
    Type: String
    Default: ""
    Description: Optional Stripe price id for GRN Pro checkout
Conditions:
  DeployCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref DomainHostedZoneId, ""]]
  DeployCiAuthSeedFunction: !Not [!Equals [!Ref EnvironmentName, prod]]
  DeploySharedApiBasePathMapping: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref DomainHostedZoneId, ""]]

Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: !If
        - DeployCustomDomain
        - !Sub "'${DomainProtocol}://grn.${DomainName}'"
        - "'*'"
  Function:
    Architectures: [ arm64 ]
    Tracing: Disabled
    Timeout: 2
    MemorySize: 1024

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External:
      - '@aws-sdk/*'

Resources:
  # Database connection is managed externally via Neon Postgres
  # DATABASE_URL is provided as an environment variable to Lambda functions

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "${AWS::StackName}-events"

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "Good Roots Network API (${EnvironmentName})"
      TracingEnabled: false
      StageName: api
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: !If
          - DeployCustomDomain
          - !Sub "'${DomainProtocol}://grn.${DomainName}'"
          - "'*'"
      Auth:
        DefaultAuthorizer: LambdaAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          LambdaAuthorizer:
            FunctionPayloadType: REQUEST
            FunctionArn: !GetAtt LambdaAuthorizerFunction.Arn
            Identity:
              Headers:
                - Authorization
      MethodSettings:
        - MetricsEnabled: True
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: ERROR
          DataTraceEnabled: True

  SharedApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeploySharedApiBasePathMapping
    DependsOn:
      - ApiapiStage
    Properties:
      DomainName: !Sub 'api.${DomainName}'
      RestApiId: !Ref Api
      Stage: api
      BasePath: grn

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt FrontendBucket.Arn
              - !Sub "${FrontendBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": false

  # Using AWS managed ResponseHeadersPolicy instead of stack-managed custom policy.
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Aliases: !If
          - DeployCustomDomain
          - [!Sub 'grn.${DomainName}']
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployCustomDomain
          - AcmCertificateArn: !Ref FrontendCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # Use AWS-managed security headers policy to avoid per-stack policy quota exhaustion.
          ResponseHeadersPolicyId: "67f7725c-6f97-4210-82d7-5512b31e9d03"
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

  FrontendCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub 'grn.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub 'grn.${DomainName}'
          HostedZoneId: !Ref DomainHostedZoneId

  FrontendDNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Sub 'grn.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  LambdaAuthorizerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: lambda-authorizer
    Properties:
      CodeUri: .
      Handler: bootstrap
      Runtime: provided.al2023
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminListGroupsForUser
              Resource: !Sub
                - "arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
                - UserPoolId: !ImportValue OGF-UserPoolId
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          USER_POOL_ID: !ImportValue OGF-UserPoolId
          USER_POOL_CLIENT_ID: !ImportValue OGF-UserPoolClientId

  CiAuthSeedUsersFunction:
    Type: AWS::Serverless::Function
    Condition: DeployCiAuthSeedFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ci-auth-seed.mjs
    Properties:
      CodeUri: functions
      Handler: ci-auth-seed.handler
      Runtime: nodejs24.x
      Timeout: 30
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminListGroupsForUser
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminRemoveUserFromGroup
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminInitiateAuth
              Resource: !Sub
                - "arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
                - UserPoolId: !ImportValue OGF-UserPoolId
      Environment:
        Variables:
          USER_POOL_ID: !ImportValue OGF-UserPoolId
          USER_POOL_CLIENT_ID: !ImportValue OGF-UserPoolClientId
          DATABASE_URL: !Ref DatabaseUrl

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: api
    Properties:
      CodeUri: .
      Handler: bootstrap
      Runtime: provided.al2023
      Timeout: 5
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource: !GetAtt EventBus.Arn
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          EVENT_BUS_NAME: !Ref EventBus
          ORIGIN: !If
            - DeployCustomDomain
            - !Sub "${DomainProtocol}://grn.${DomainName}"
            - "*"
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          STRIPE_PRO_PRICE_ID: !Ref StripeProPriceId
          RUST_LOG: info
          RUST_BACKTRACE: "1"
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY

  RollingGeoAggregationWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - rolling-geo-aggregation.mjs
    Properties:
      CodeUri: functions
      Handler: rolling-geo-aggregation.handler
      Runtime: nodejs24.x
      Timeout: 15
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
      Events:
        ListingCreatedEvent:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref EventBus
            Pattern:
              source:
                - grn.api
              detail-type:
                - listing.created
                - listing.updated
                - request.created
                - request.updated
                - claim.created
                - claim.updated


  ProfileDerivedWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - profile-derived-worker.mjs
    Properties:
      CodeUri: functions
      Handler: profile-derived-worker.handler
      Runtime: nodejs24.x
      Timeout: 30
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
      Events:
        ProfileUpdatedEvent:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref EventBus
            Pattern:
              source:
                - grn.api
              detail-type:
                - user.profile.updated
                - listing.created
                - listing.updated
                - claim.created
                - claim.updated

  # CatalogSeedFunction:
  #   Type: AWS::Serverless::Function
  #   Metadata:
  #     BuildMethod: esbuild
  #     BuildProperties:
  #       <<: *esbuild-properties
  #       EntryPoints:
  #         - catalog-seed.mjs
  #   Properties:
  #     CodeUri: functions
  #     Handler: catalog-seed.handler
