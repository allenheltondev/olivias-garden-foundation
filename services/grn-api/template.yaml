  #       - AWSLambdaBasicExecutionRole
  #     Environment:
  #       Variables:
  #         DATABASE_URL: !Ref DatabaseUrl

  # CatalogSeedTrigger:
  #   Type: Custom::CatalogSeed
  #   Properties:
  #     ServiceToken: !GetAtt CatalogSeedFunction.Arn
  #     SeedVersion: "1"

  ProStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: pro-template.yaml
      Parameters:
        ParentStackName: !Ref AWS::StackName
        EventBusArn: !GetAtt EventBus.Arn

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !If
      - DeploySharedApiBasePathMapping
      - !Sub
        - "https://api.${RootDomainName}/grn"
        - RootDomainName: !Ref DomainName
      - !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/api"

  EventBusName:
    Description: Name of the EventBridge custom bus
    Value: !Ref EventBus

  FrontendUrl:
    Description: CloudFront distribution URL for frontend
    Value: !If
      - DeployCustomDomain
      - !Sub "${DomainProtocol}://grn.${DomainName}"
      - !Sub "https://${FrontendDistribution.DomainName}"

  FrontendBucket:
    Description: S3 bucket name for frontend deployment
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID for cache invalidation
    Value: !Ref FrontendDistribution

  CiAuthSeedUsersFunctionName:
    Description: Lambda name used to generate temporary Cognito JWTs for CI Postman runs
    Value: !If
      - DeployCiAuthSeedFunction
      - !Ref CiAuthSeedUsersFunction
      - "NONE"

  ProAgentTaskQueueUrl:
    Description: URL of the pro agent task queue in the nested pro stack
    Value: !GetAtt ProStack.Outputs.PremiumAgentTaskQueueUrl

  ProAgentTaskQueueArn:
    Description: ARN of the pro agent task queue in the nested pro stack
    Value: !GetAtt ProStack.Outputs.PremiumAgentTaskQueueArn
