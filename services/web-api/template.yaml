AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Web API for Olivia's Garden Foundation public-site commerce flows

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string
  EnvironmentName:
    Type: String
    Default: staging
    AllowedValues:
      - dev
      - staging
      - prod
      - pr
  DomainName:
    Type: String
    Default: ""
    Description: Optional root domain name used for shared API base path mapping
  DomainHostedZoneId:
    Type: String
    Default: ""
    Description: Optional Route 53 hosted zone id for shared API base path mapping
  DomainProtocol:
    Type: String
    Default: https
    AllowedValues: ["https", "http"]
  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Stripe secret key for donation checkout
  StripeEventBusName:
    Type: String
    Default: ""
    Description: Optional Stripe EventBridge event bus name for donation lifecycle events
  DonationSlackWebhookUrl:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Slack webhook URL used for donation notifications
  ContactSlackWebhookUrl:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Slack webhook URL used for contact / organization inquiry notifications

Conditions:
  DeploySharedApiBasePathMapping: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref DomainHostedZoneId, ""]]
  HasStripeEventBus: !Not [!Equals [!Ref StripeEventBusName, ""]]

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 1024
    # Architectures is set per-function below — SAM doesn't honor a
    # per-function override when the value is also set in Globals, so the
    # only way to have most functions on arm64 and the canvas-consuming
    # AvatarProcessorFunction on x86_64 is to omit it here and declare it
    # on every function explicitly.
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
        DATABASE_URL: !Ref DatabaseUrl
        ORIGIN: !If
          - DeploySharedApiBasePathMapping
          - !Sub "${DomainProtocol}://${DomainName}"
          - "*"
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        SLACK_WEBHOOK_URL: !Ref DonationSlackWebhookUrl
        CONTACT_SLACK_WEBHOOK_URL: !Ref ContactSlackWebhookUrl
        FOUNDATION_ENVIRONMENT: !Ref EnvironmentName
        OGF_USER_POOL_ID: !ImportValue OGF-UserPoolId
        OGF_USER_POOL_CLIENT_ID: !ImportValue OGF-UserPoolClientId
        ALLOWED_RETURN_URL_ORIGINS: !ImportValue OGF-WebFrontendUrl
        MEDIA_BUCKET_NAME: !ImportValue OGF-AssetsBucketName
        MEDIA_CDN_DOMAIN: !ImportValue OGF-AssetsPublicDomainName
        AVATAR_PROCESSING_EVENT_BUS_NAME: default

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External:
      - '@aws-sdk/*'

Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "Olivia's Garden Foundation Web API (${EnvironmentName})"
      TracingEnabled: false
      StageName: api
      Cors:
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,Idempotency-Key,X-Correlation-Id,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: !If
          - DeploySharedApiBasePathMapping
          - !Sub "'${DomainProtocol}://${DomainName}'"
          - "'*'"
      MethodSettings:
        - MetricsEnabled: true
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: ERROR
          DataTraceEnabled: true

  SharedApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: DeploySharedApiBasePathMapping
    DependsOn:
      - ApiapiStage
    Properties:
      DomainName: !Sub "api.${DomainName}"
      RestApiId: !Ref Api
      Stage: api
      BasePath: web

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ./src/handlers/api.mjs
    Properties:
      CodeUri: .
      Handler: src/handlers/api.handler
      Architectures:
        - arm64
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub
                - '${SharedAssetsBucketArn}/avatars/*'
                - SharedAssetsBucketArn: !ImportValue OGF-AssetsBucketArn
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default'
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: ANY

  AvatarProcessorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ./src/handlers/avatar-processor.mjs
        External:
          - '@aws-sdk/*'
          - '@napi-rs/canvas'
    Properties:
      CodeUri: .
      Handler: src/handlers/avatar-processor.handler
      Timeout: 60
      MemorySize: 1024
      # x86_64 because the napi-rs-canvas:888 layer only ships an x86_64
      # native binary. Rest of the stack stays arm64; see Globals comment.
      Architectures:
        - x86_64
      Layers:
        - arn:aws:lambda:us-east-1:205979422636:layer:napi-rs-canvas:888
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub
                - '${SharedAssetsBucketArn}/avatars/*'
                - SharedAssetsBucketArn: !ImportValue OGF-AssetsBucketArn
      Events:
        AvatarClaimedEvent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - ogf.web-api.avatars
              detail-type:
                - avatar.claimed

  StripeEventConsumerFunction:
    Type: AWS::Serverless::Function
    Condition: HasStripeEventBus
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - ./src/handlers/stripe-event-consumer.mjs
    Properties:
      CodeUri: .
      Handler: src/handlers/stripe-event-consumer.handler
      Architectures:
        - arm64
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        StripeDonationEvents:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref StripeEventBusName
            Pattern:
              detail-type:
                - checkout.session.completed
                - checkout.session.expired
                - customer.subscription.deleted
                - invoice.paid
                - invoice.payment_failed

Outputs:
  ApiUrl:
    Description: Web API endpoint URL
    Value: !If
      - DeploySharedApiBasePathMapping
      - !Sub "https://api.${DomainName}/web"
      - !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/api"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"
