# ── AI (Premium) ─────────────────────────────────────────
/ai/copilot/weekly-plan:
  post:
    tags: [AI, Premium]
    summary: Generate AI weekly grow plan
    operationId: generateWeeklyPlan
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/premium.yaml#/WeeklyPlanRequest'
    responses:
      '200':
        description: Weekly plan recommendations
        content:
          application/json:
            schema:
              $ref: '../schemas/premium.yaml#/WeeklyPlanResponse'
      '400':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
      '403':
        $ref: '../schemas/_responses.yaml#/FeatureLockedResponse'
      '429':
        description: AI guardrail rate limit
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
      '500':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'

# ── Agent Tasks (Premium) ────────────────────────────────
/agent-tasks:
  get:
    tags: [Agent Tasks, Premium, Idempotent]
    summary: List agent tasks
    operationId: listAgentTasks
    responses:
      '200':
        description: Agent task list
        content:
          application/json:
            schema:
              $ref: '../schemas/premium.yaml#/AgentTaskListResponse'
      '403':
        $ref: '../schemas/_responses.yaml#/FeatureLockedResponse'
      '500':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
  post:
    tags: [Agent Tasks, Premium]
    summary: Create an agent task
    operationId: createAgentTask
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/premium.yaml#/CreateAgentTaskRequest'
    responses:
      '201':
        description: Created agent task
        content:
          application/json:
            schema:
              $ref: '../schemas/premium.yaml#/AgentTaskResponse'
      '400':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
      '403':
        $ref: '../schemas/_responses.yaml#/FeatureLockedResponse'
      '500':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'

/agent-tasks/{taskId}:
  parameters:
    - in: path
      name: taskId
      required: true
      schema:
        type: string
        format: uuid
  put:
    tags: [Agent Tasks, Premium]
    summary: Update agent task status
    operationId: updateAgentTaskStatus
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/premium.yaml#/UpdateAgentTaskStatusRequest'
    responses:
      '200':
        description: Updated agent task
        content:
          application/json:
            schema:
              $ref: '../schemas/premium.yaml#/AgentTaskResponse'
      '400':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
      '403':
        $ref: '../schemas/_responses.yaml#/FeatureLockedResponse'
      '404':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
      '500':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'

# ── Analytics (Premium) ──────────────────────────────────
/analytics/premium/events:
  post:
    tags: [Analytics, Premium]
    summary: Track a premium analytics event
    operationId: trackPremiumEvent
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/premium.yaml#/TrackEventRequest'
    responses:
      '202':
        description: Event accepted
        content:
          application/json:
            schema:
              type: object
              properties:
                accepted:
                  type: boolean
      '400':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
      '403':
        $ref: '../schemas/_responses.yaml#/FeatureLockedResponse'
      '500':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'

/analytics/premium/kpis:
  get:
    tags: [Analytics, Premium, Idempotent]
    summary: Get premium analytics KPIs
    operationId: getPremiumKpis
    parameters:
      - in: query
        name: days
        schema:
          type: integer
          default: 7
    responses:
      '200':
        description: KPI funnel data
        content:
          application/json:
            schema:
              $ref: '../schemas/premium.yaml#/PremiumKpiResponse'
      '403':
        $ref: '../schemas/_responses.yaml#/FeatureLockedResponse'
      '500':
        $ref: '../schemas/_responses.yaml#/ErrorResponse'
