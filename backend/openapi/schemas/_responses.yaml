ErrorResponse:
  description: Error payload
  content:
    application/json:
      schema:
        $ref: '#/ErrorSchema'

FeatureLockedResponse:
  description: Premium entitlement required
  content:
    application/json:
      schema:
        $ref: '#/FeatureLockedErrorSchema'

ErrorSchema:
  type: object
  required: [error]
  properties:
    error:
      type: string

FeatureLockedErrorSchema:
  type: object
  required: [error, entitlementKey, requiredTier, upgradeHintKey]
  properties:
    error:
      type: string
      enum: [feature_locked]
    entitlementKey:
      type: string
    requiredTier:
      type: string
    upgradeHintKey:
      type: string
