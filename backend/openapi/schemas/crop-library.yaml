GrowerCropItem:
  type: object
  required: [id, userId, canonicalId, cropName, status, visibility, surplusEnabled, createdAt, updatedAt]
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    canonicalId:
      type: string
      format: uuid
      nullable: true
      description: "Links to catalog crop when available, null for user-defined crops"
    cropName:
      type: string
      description: "User-defined crop name or catalog crop name"
    varietyId:
      type: string
      format: uuid
      nullable: true
    status:
      type: string
      enum: [interested, planning, growing, paused]
    visibility:
      type: string
      enum: [private, local, public]
    surplusEnabled:
      type: boolean
    nickname:
      type: string
      nullable: true
    defaultUnit:
      type: string
      nullable: true
    notes:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

UpsertGrowerCropRequest:
  type: object
  required: [cropName, status, visibility, surplusEnabled]
  properties:
    canonicalId:
      type: string
      format: uuid
      nullable: true
      description: "Optional link to catalog crop. If provided, cropName should match catalog name"
    cropName:
      type: string
      description: "The crop name to display and use for this entry"
    varietyId:
      type: string
      format: uuid
      nullable: true
    status:
      type: string
      enum: [interested, planning, growing, paused]
    visibility:
      type: string
      enum: [private, local, public]
    surplusEnabled:
      type: boolean
    nickname:
      type: string
      nullable: true
    defaultUnit:
      type: string
      nullable: true
    notes:
      type: string
      nullable: true
