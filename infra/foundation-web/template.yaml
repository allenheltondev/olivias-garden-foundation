AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Shared infrastructure for the Olivia's Garden Foundation web app.

Parameters:
  EnvironmentName:
    Type: String
    Default: staging
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment name used for environment-specific resources.
  DomainName:
    Type: String
    Default: ''
    Description: Optional custom domain name for the foundation web frontend.
  DomainHostedZoneId:
    Type: String
    Default: ''
    Description: Optional Route53 hosted zone ID for the custom domain.
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string for the shared GRN database user table.
  SignupSlackWebhookUrl:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional Slack webhook URL for foundation signup notifications.
  GoogleClientId:
    Type: String
    Default: ''
    Description: Optional Google OAuth client ID for Cognito social sign-in.
  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional Google OAuth client secret for Cognito social sign-in.
  EnableGoogleOnUserPoolClient:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to true only after the Google identity provider already exists in the user pool.

Globals:
  Function:
    Architectures: [arm64]
    Runtime: nodejs24.x
    Timeout: 5
    MemorySize: 512

Conditions:
  IsProdEnvironment: !Equals [!Ref EnvironmentName, 'prod']
  DeployCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, '']]
    - !Not [!Equals [!Ref DomainHostedZoneId, '']]
  EnableGoogleIdentityProvider: !And
    - !Not [!Equals [!Ref GoogleClientId, '']]
    - !Not [!Equals [!Ref GoogleClientSecret, '']]
  EnableGoogleOnClient: !And
    - !Condition EnableGoogleIdentityProvider
    - !Equals [!Ref EnableGoogleOnUserPoolClient, 'true']
  EnableProdCognitoCustomDomain: !And
    - !Condition IsProdEnvironment
    - !Condition DeployCustomDomain

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2020
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External:
      - '@aws-sdk/*'

Resources:
  FoundationUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-users'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      UserAttributeUpdateSettings:
        AttributesRequireVerificationBeforeUpdate:
          - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: newsletter_opt_in
          AttributeDataType: String
          DeveloperOnlyAttribute: false
          Mutable: true
      LambdaConfig:
        PostConfirmation: !GetAtt FoundationPostConfirmationFunction.Arn

  FoundationPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - post-confirmation.mjs
    Properties:
      CodeUri: functions
      Handler: post-confirmation.handler
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          SLACK_WEBHOOK_URL: !Ref SignupSlackWebhookUrl
          FOUNDATION_ENVIRONMENT: !Ref EnvironmentName

  FoundationPostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FoundationPostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${FoundationUserPool}'

  FoundationUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref FoundationUserPool
      ClientName: !Sub '${AWS::StackName}-web-client'
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_AUTH
      AuthSessionValidity: 3
      EnableTokenRevocation: true
      PreventUserExistenceErrors: ENABLED
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 24
      IdTokenValidity: 24
      RefreshTokenValidity: 30
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - 'http://localhost:4174/auth/callback'
        - !Sub 'https://${WebFrontendDistribution.DomainName}/auth/callback'
        - !If
          - DeployCustomDomain
          - !Sub 'https://${DomainName}/auth/callback'
          - !Ref AWS::NoValue
        - !If
          - DeployCustomDomain
          - !Sub 'https://www.${DomainName}/auth/callback'
          - !Ref AWS::NoValue
      LogoutURLs:
        - 'http://localhost:4174/'
        - !Sub 'https://${WebFrontendDistribution.DomainName}/'
        - !If
          - DeployCustomDomain
          - !Sub 'https://${DomainName}/'
          - !Ref AWS::NoValue
        - !If
          - DeployCustomDomain
          - !Sub 'https://www.${DomainName}/'
          - !Ref AWS::NoValue
      SupportedIdentityProviders:
        - COGNITO
        - !If [EnableGoogleOnClient, Google, !Ref AWS::NoValue]

  FoundationFreeTierGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: free-tier
      UserPoolId: !Ref FoundationUserPool
      Description: Free tier users with basic foundation and GRN features
      Precedence: 3

  FoundationSupporterTierGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: supporter-tier
      UserPoolId: !Ref FoundationUserPool
      Description: Supporter tier users with enhanced foundation and GRN features
      Precedence: 2

  FoundationProTierGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: pro-tier
      UserPoolId: !Ref FoundationUserPool
      Description: Pro tier users with pro foundation and GRN features
      Precedence: 1

  FoundationUserPoolCustomDomainCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: EnableProdCognitoCustomDomain
    Properties:
      DomainName: !Sub 'auth.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub 'auth.${DomainName}'
          HostedZoneId: !Ref DomainHostedZoneId

  FoundationUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref FoundationUserPool
      Domain: !If
        - EnableProdCognitoCustomDomain
        - !Sub 'auth.${DomainName}'
        - !Sub '${AWS::StackName}-auth-${AWS::AccountId}'
      ManagedLoginVersion: 2
      CustomDomainConfig: !If
        - EnableProdCognitoCustomDomain
        - CertificateArn: !Ref FoundationUserPoolCustomDomainCertificate
        - !Ref AWS::NoValue

  FoundationUserPoolCustomDomainRecordA:
    Type: AWS::Route53::RecordSet
    Condition: EnableProdCognitoCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Sub 'auth.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt FoundationUserPoolDomain.CloudFrontDistribution
        HostedZoneId: Z2FDTNDATAQYW2

  FoundationUserPoolCustomDomainRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: EnableProdCognitoCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Sub 'auth.${DomainName}'
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt FoundationUserPoolDomain.CloudFrontDistribution
        HostedZoneId: Z2FDTNDATAQYW2

  FoundationGoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: EnableGoogleIdentityProvider
    Properties:
      UserPoolId: !Ref FoundationUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        authorize_scopes: openid email profile
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
      AttributeMapping:
        email: email
        email_verified: email_verified
        given_name: given_name
        family_name: family_name
        name: name
        username: sub

  WebFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpirePullRequestScreenshots
            Status: Enabled
            Prefix: pr-screenshots/
            ExpirationInDays: 7
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: App
          Value: ogf-web
        - Key: Environment
          Value: !Ref EnvironmentName

  SharedAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - AllowedMethods:
              - PUT
              - POST
              - GET
              - HEAD
            AllowedOrigins:
              - '*'
            AllowedHeaders:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 300
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: App
          Value: ogf-assets
        - Key: Environment
          Value: !Ref EnvironmentName

  WebFrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-web-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Rewrites /<path> to /<path>/index.html so per-route prerendered HTML
  # snapshots (see apps/web/scripts/prerender-head.mjs) are served to
  # crawlers and unfurl bots. Requests that already reference a static
  # asset (anything with a dot in the final segment) pass through
  # unchanged so /assets/*, /images/*, robots.txt, sitemap.xml etc. still
  # resolve. When the rewritten path has no snapshot in S3 the existing
  # 403/404 â†’ /index.html fallback still delivers the SPA shell.
  WebFrontendRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${AWS::StackName}-web-rewrite'
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrites clean URLs to their /index.html snapshot
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;

          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
            return request;
          }

          var lastSegment = uri.slice(uri.lastIndexOf('/') + 1);
          if (lastSegment.indexOf('.') === -1) {
            request.uri = uri + '/index.html';
          }

          return request;
        }

  SharedAssetsOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-assets-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebFrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Aliases: !If
          - DeployCustomDomain
          - [!Ref DomainName, !Sub 'www.${DomainName}']
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployCustomDomain
          - AcmCertificateArn: !Ref WebFrontendCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: WebFrontendS3Origin
            DomainName: !GetAtt WebFrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref WebFrontendOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: WebFrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: '67f7725c-6f97-4210-82d7-5512b31e9d03'
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt WebFrontendRewriteFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  SharedAssetsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        Aliases: !If
          - DeployCustomDomain
          - [!Sub 'assets.${DomainName}']
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployCustomDomain
          - AcmCertificateArn: !Ref SharedAssetsCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: SharedAssetsS3Origin
            DomainName: !GetAtt SharedAssetsBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref SharedAssetsOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: SharedAssetsS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: '67f7725c-6f97-4210-82d7-5512b31e9d03'

  WebFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebFrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub '${WebFrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebFrontendDistribution}'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt WebFrontendBucket.Arn
              - !Sub '${WebFrontendBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  SharedAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SharedAssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub '${SharedAssetsBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SharedAssetsDistribution}'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt SharedAssetsBucket.Arn
              - !Sub '${SharedAssetsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  WebFrontendCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub 'www.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref DomainHostedZoneId
        - DomainName: !Sub 'www.${DomainName}'
          HostedZoneId: !Ref DomainHostedZoneId

  SharedAssetsCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub 'assets.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub 'assets.${DomainName}'
          HostedZoneId: !Ref DomainHostedZoneId

  SharedApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub 'api.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub 'api.${DomainName}'
          HostedZoneId: !Ref DomainHostedZoneId

  SharedApiGatewayDomainName:
    Type: AWS::ApiGateway::DomainName
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub 'api.${DomainName}'
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !Ref SharedApiCertificate
      SecurityPolicy: TLS_1_2

  WebFrontendDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt WebFrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WebFrontendWwwDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Sub 'www.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt WebFrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  SharedAssetsDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Sub 'assets.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt SharedAssetsDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  SharedApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: !Sub 'api.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt SharedApiGatewayDomainName.RegionalDomainName
        HostedZoneId: !GetAtt SharedApiGatewayDomainName.RegionalHostedZoneId
        EvaluateTargetHealth: false

Outputs:
  WebFrontendBucketName:
    Description: S3 bucket that stores foundation web static assets.
    Value: !Ref WebFrontendBucket

  WebFrontendDistributionId:
    Description: CloudFront distribution ID for the foundation web frontend.
    Value: !Ref WebFrontendDistribution

  WebFrontendUrl:
    Description: Public URL for the foundation web frontend.
    Value: !If
      - DeployCustomDomain
      - !Sub 'https://${DomainName}'
      - !Sub 'https://${WebFrontendDistribution.DomainName}'
    Export:
      Name: OGF-WebFrontendUrl

  SharedAssetsBucketName:
    Description: Shared S3 bucket for uploaded and served assets.
    Value: !Ref SharedAssetsBucket
    Export:
      Name: OGF-AssetsBucketName

  SharedAssetsBucketArn:
    Description: ARN for the shared assets bucket.
    Value: !GetAtt SharedAssetsBucket.Arn
    Export:
      Name: OGF-AssetsBucketArn

  SharedAssetsPublicDomainName:
    Description: Public hostname for shared foundation assets.
    Value: !If
      - DeployCustomDomain
      - !Sub 'assets.${DomainName}'
      - !GetAtt SharedAssetsDistribution.DomainName
    Export:
      Name: OGF-AssetsPublicDomainName

  SharedAssetsUrl:
    Description: Public base URL for shared foundation assets.
    Value: !If
      - DeployCustomDomain
      - !Sub 'https://assets.${DomainName}'
      - !Sub 'https://${SharedAssetsDistribution.DomainName}'

  SharedApiUrl:
    Condition: DeployCustomDomain
    Description: Shared API custom domain base URL.
    Value: !Sub 'https://api.${DomainName}'

  UserPoolId:
    Description: Cognito User Pool ID for the foundation web app.
    Value: !Ref FoundationUserPool
    Export:
      Name: OGF-UserPoolId

  UserPoolClientId:
    Description: Cognito User Pool App Client ID for the foundation web app.
    Value: !Ref FoundationUserPoolClient
    Export:
      Name: OGF-UserPoolClientId

  UserPoolDomain:
    Description: Cognito Hosted UI domain for the foundation web app.
    Value: !If
      - EnableProdCognitoCustomDomain
      - !Sub 'auth.${DomainName}'
      - !Sub '${FoundationUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: OGF-UserPoolDomain

  UserPoolDomainCloudFrontTarget:
    Condition: EnableProdCognitoCustomDomain
    Description: CloudFront distribution target for the Cognito custom domain alias.
    Value: !GetAtt FoundationUserPoolDomain.CloudFrontDistribution
