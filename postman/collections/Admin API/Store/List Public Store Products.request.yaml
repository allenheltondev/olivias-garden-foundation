$kind: http-request
name: List Public Store Products
description: |-
  Retrieve the public store catalog from the admin-owned store service.
method: GET
url: '{{baseUrl}}/store/products'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      const response = pm.response.json();

      pm.test("Response contains items array", function () {
          pm.expect(response).to.have.property("items");
          pm.expect(Array.isArray(response.items)).to.eql(true);
      });
