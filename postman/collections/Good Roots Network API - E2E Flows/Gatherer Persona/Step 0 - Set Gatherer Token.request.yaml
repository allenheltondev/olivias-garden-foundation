$kind: http-request
name: 'Step 0 - Set Gatherer Token'
description: |-
  Initialize the active auth token to the gatherer token for the gatherer persona flow.

  Uses GET /me as a lightweight request to validate the token is working.

  **Chaining**: Sets `authToken` to `{{gathererAuthToken}}` via pre-request script.
method: GET
url: '{{baseUrl}}/me'
order: 500
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      // Swap authToken to gatherer for the gatherer persona flow
      const gathererToken = pm.variables.get("gathererAuthToken");
      if (gathererToken) {
          pm.collectionVariables.set("authToken", gathererToken);
      } else {
          console.error("gathererAuthToken not set; aborting.");
          pm.execution.setNextRequest(null);
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
