$kind: http-request
name: 'Step 5a - Grower Creates Listing'
description: |-
  Temporarily swap to grower token and create a listing for the gatherer to claim.

  **Chaining**: Sets `authToken` to `{{growerAuthToken}}`, captures `listingId` from the response.
method: POST
url: '{{baseUrl}}/listings'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Gatherer Persona E2E Listing",
      "cropId": "{{catalogCropId}}",
      "quantityTotal": 5,
      "unit": "lb",
      "availableStart": "2026-07-01T08:00:00Z",
      "availableEnd": "2026-07-03T18:00:00Z",
      "pickupLocationText": "Back porch",
      "status": "active"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      // Swap authToken to grower to create a listing
      const growerToken = pm.variables.get("growerAuthToken");
      if (growerToken) {
          pm.collectionVariables.set("authToken", growerToken);
      } else {
          console.error("growerAuthToken not set; aborting.");
          pm.execution.setNextRequest(null);
      }

      let cropId = pm.collectionVariables.get("catalogCropId");
      const fallbackCropId = pm.collectionVariables.get("defaultCatalogCropId");
      const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

      if ((!cropId || !uuidRe.test(cropId)) && fallbackCropId && uuidRe.test(fallbackCropId)) {
          cropId = fallbackCropId;
          pm.collectionVariables.set("catalogCropId", cropId);
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Capture listingId for gatherer claim", function () {
          const listing = pm.response.json();
          pm.expect(listing).to.have.property("id");

          if (!listing.id) {
              pm.expect.fail("Missing listing.id; aborting chained run.");
              pm.execution.setNextRequest(null);
              return;
          }

          pm.collectionVariables.set("listingId", listing.id);
      });
