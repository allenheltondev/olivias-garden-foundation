$kind: http-request
name: 'Step 3 - Discover Listings'
description: |-
  Verify the gatherer can access the listing discovery endpoint.

  **Depends on**: `authToken` set to gatherer token
  **Asserts**: 200 response with an `items` array.
method: GET
url: '{{baseUrl}}/listings/discover'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
queryParams:
  - key: geoKey
    value: '{{gathererGeoKey}}'
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const geoKey = pm.collectionVariables.get("gathererGeoKey");
      if (!geoKey) {
          console.error("gathererGeoKey not set; aborting.");
          pm.execution.setNextRequest(null);
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response contains items array", function () {
          const body = pm.response.json();
          pm.expect(body).to.have.property("items");
          pm.expect(body.items).to.be.an("array");
      });
