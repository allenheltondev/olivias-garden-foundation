$kind: http-request
name: 'Step 0 - Set Grower Token'
description: |-
  Initialize the active auth token to the grower token for the claim lifecycle flow.

  Uses GET /me as a lightweight request to validate the token is working.

  **Chaining**: Sets `authToken` to `{{growerAuthToken}}` via pre-request script.
method: GET
url: '{{baseUrl}}/me'
order: 500
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      // Swap authToken to grower for the claim lifecycle flow
      const growerToken = pm.collectionVariables.get("growerAuthToken");
      if (growerToken) {
          pm.collectionVariables.set("authToken", growerToken);
      } else {
          console.error("growerAuthToken not set; aborting.");
          pm.execution.setNextRequest(null);
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
