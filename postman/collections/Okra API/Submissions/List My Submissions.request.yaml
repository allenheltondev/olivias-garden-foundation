$kind: http-request
name: List My Submissions
description: Retrieve okra submissions owned by the authenticated contributor.
method: GET
url: '{{okraBaseUrl}}/me/submissions'
order: 1020
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: X-Correlation-Id
    value: postman-okra-my-submissions
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("GET /me/submissions returns 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has submissions array", function () {
          const body = pm.response.json();
          pm.expect(body).to.have.property("submissions");
          pm.expect(body.submissions).to.be.an("array");
      });
