$kind: http-request
name: 'Update Current User (PUT /me)'
description: |-
  Create or update the authenticated user's profile. This request:
  - Updates user profile with grower configuration
  - Returns 204 No Content on success
  - Captures myUserId from a follow-up GET /me
method: PUT
url: '{{baseUrl}}/me'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "displayName": "Profile Smoke Test User",
      "userType": "grower",
      "growerProfile": {
        "homeZone": "US-TX-Austin",
        "address": "1100 Congress Ave, Austin, TX 78701",
        "shareRadiusMiles": 15,
        "isOrganization": true,
        "organizationName": "Profile Smoke Garden Team",
        "units": "imperial",
        "locale": "en-US"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ============================================
      // PUT /me - Response Tests
      // ============================================

      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
