$kind: http-request
name: 'Initialize Grower User Type (PUT /me)'
description: |-
  Initialize the authenticated user as a grower to ensure downstream profile
  and garden flows run against the correct entitlement baseline.

  This request is intentionally lightweight and safe to run repeatedly.
method: PUT
url: '{{baseUrl}}/me'
order: 500
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "displayName": "CI Grower",
      "userType": "grower"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ============================================
      // PUT /me - Grower Initialization Guard
      // ============================================

      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
