$kind: http-request
name: 'Get Current User (GET /me)'
description: |-
  Retrieve the authenticated user's profile and validate the state after PUT /me.

  This request verifies:
  - GET returns the updated profile data
  - All required fields are present with correct types
  - Onboarding status reflects completed state
  - Captures myUserId for downstream requests
method: GET
url: '{{baseUrl}}/me'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ============================================
      // GET /me - Response Tests and State Validation
      // ============================================

      // --- Status Code Validation ---
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      // --- Parse Response ---
      const jsonData = pm.response.json();

      // --- Capture myUserId for downstream requests ---
      pm.test("Capture myUserId from response", function () {
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData.id).to.be.a("string");
          pm.collectionVariables.set("myUserId", jsonData.id);
          pm.collectionVariables.set("userId", jsonData.id);
          console.log("Captured myUserId:", jsonData.id);
      });

      // --- Required Fields Existence Tests ---
      pm.test("Response has required field: id", function () {
          pm.expect(jsonData).to.have.property("id");
      });

      pm.test("Response has required field: isVerified", function () {
          pm.expect(jsonData).to.have.property("isVerified");
      });

      pm.test("Response has required field: createdAt", function () {
          pm.expect(jsonData).to.have.property("createdAt");
      });

      pm.test("Response has required field: onboardingCompleted", function () {
          pm.expect(jsonData).to.have.property("onboardingCompleted");
      });

      // --- Type Validation Tests ---
      pm.test("id is a string (UUID format)", function () {
          pm.expect(jsonData.id).to.be.a("string");
          pm.expect(jsonData.id).to.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i);
      });

      pm.test("isVerified is a boolean", function () {
          pm.expect(jsonData.isVerified).to.be.a("boolean");
      });

      pm.test("createdAt is a string (ISO date format)", function () {
          pm.expect(jsonData.createdAt).to.be.a("string");
          const parsed = Date.parse(jsonData.createdAt);
          pm.expect(Number.isNaN(parsed), "createdAt should be parseable as an ISO timestamp").to.eql(false);
      });

      pm.test("onboardingCompleted is a boolean", function () {
          pm.expect(jsonData.onboardingCompleted).to.be.a("boolean");
      });

      pm.test("experienceLevel is present and within supported enum values", function () {
          pm.expect(jsonData).to.have.property("experienceLevel");
          pm.expect(["beginner", "intermediate", "advanced"]).to.include(jsonData.experienceLevel);
      });

      pm.test("experienceSignals object is present with non-negative numeric counters", function () {
          pm.expect(jsonData).to.have.property("experienceSignals");
          const signals = jsonData.experienceSignals;
          pm.expect(signals).to.be.an("object");

          [
              "completedGrows",
              "successfulHarvests",
              "activeDaysLast90",
              "seasonalConsistency",
              "varietyBreadth",
              "badgeCredibility"
          ].forEach((key) => {
              pm.expect(signals).to.have.property(key);
              pm.expect(signals[key]).to.be.a("number");
              pm.expect(signals[key]).to.be.at.least(0);
          });
      });

      pm.test("curatedTips are present with structured seasonal and zone metadata", function () {
          pm.expect(jsonData).to.have.property("curatedTips");
          pm.expect(Array.isArray(jsonData.curatedTips)).to.eql(true);

          jsonData.curatedTips.forEach((tip, index) => {
              pm.expect(tip).to.have.property("schemaVersion", "tips.v1");
              pm.expect(tip).to.have.property("title");
              pm.expect(tip).to.have.property("body");
              pm.expect(["watering", "pests", "planting", "soil", "seasonal", "harvest"]).to.include(tip.category);
              pm.expect(["beginner", "intermediate", "advanced"]).to.include(tip.level);
              pm.expect(tip).to.have.property("season");
              pm.expect(tip.season, `curatedTips[${index}].season`).to.be.a("string").and.not.empty;
              pm.expect(tip).to.have.property("zoneTags");
              pm.expect(Array.isArray(tip.zoneTags), `curatedTips[${index}].zoneTags`).to.eql(true);
              pm.expect(tip.zoneTags.length, `curatedTips[${index}].zoneTags must not be empty`).to.be.above(0);
          });
      });


      // --- Validate State After PUT ---
      pm.test("onboardingCompleted is true (reflects PUT update)", function () {
          pm.expect(jsonData.onboardingCompleted).to.eql(true);
      });

      pm.test("userType is grower (reflects PUT update)", function () {
          pm.expect(jsonData.userType).to.eql("grower");
      });

      pm.test("displayName is Profile Smoke Test User (reflects PUT update)", function () {
          pm.expect(jsonData.displayName).to.eql("Profile Smoke Test User");
      });

      // --- Grower Profile Validation ---
      pm.test("growerProfile is nullable per contract", function () {
          pm.expect(jsonData).to.have.property("growerProfile");
          pm.expect(
              jsonData.growerProfile === null || typeof jsonData.growerProfile === "object"
          ).to.be.true;
      });

      pm.test("growerProfile.units is a supported value when grower profile exists", function () {
          if (jsonData.growerProfile !== null) {
              pm.expect(["imperial", "metric"]).to.include(jsonData.growerProfile.units);
          }
      });

      pm.test("seasonalTimeline is an array when present", function () {
          if (jsonData.seasonalTimeline !== undefined) {
              pm.expect(Array.isArray(jsonData.seasonalTimeline)).to.eql(true);
          }
      });

      pm.test("badgeCabinet entries use supported badge keys", function () {
          if (!Array.isArray(jsonData.badgeCabinet)) {
              return;
          }

          const fixedBadgeKeys = [
              "first_harvest",
              "gardener_novice",
              "gardener_intermediate",
              "gardener_pro",
              "gardener_master",
              "fruit_tree_keeper",
              "orchard_starter",
              "berry_builder",
              "first_share",
              "neighborhood_provider",
              "abundance_giver",
              "consistency_giver",
              "reliable_grower",
              "herb_whisperer",
              "pollinator_friend",
              "water_wise",
              "compost_champion",
              "season_starter",
              "season_finisher"
          ];

          jsonData.badgeCabinet.forEach((entry) => {
              const key = entry.badgeKey || "";
              const isKnownFixed = fixedBadgeKeys.includes(key);
              const isKnownLadder = /^gardener_season_\d+$/.test(key);
              pm.expect(
                  isKnownFixed || isKnownLadder,
                  `Unexpected badge key in cabinet: ${key}`
              ).to.eql(true);
          });
      });

      pm.test("badgeCabinet earnedAt values are parseable timestamps", function () {
          if (!Array.isArray(jsonData.badgeCabinet)) {
              return;
          }

          jsonData.badgeCabinet.forEach((entry, index) => {
              if (!entry.earnedAt) {
                  return;
              }

              const parsed = Date.parse(entry.earnedAt);
              pm.expect(
                  Number.isNaN(parsed),
                  `badgeCabinet[${index}].earnedAt should be parseable: ${entry.earnedAt}`
              ).to.eql(false);
          });
      });

      // --- Subscription Metadata Validation (Issue #67) ---
      pm.test("Subscription metadata is present", function () {
          pm.expect(jsonData).to.have.property("subscription");
          pm.expect(jsonData.subscription).to.have.property("tier");
          pm.expect(jsonData.subscription).to.have.property("subscriptionStatus");
          pm.expect(jsonData.subscription.tier).to.be.oneOf(["free", "supporter", "pro"]);
          pm.expect(jsonData.subscription.subscriptionStatus).to.be.oneOf(["none", "trialing", "active", "past_due", "canceled"]);
      });

      pm.test("Free tier users have correct defaults", function () {
          if (jsonData.subscription.tier === "free") {
              pm.expect(jsonData.subscription.subscriptionStatus).to.equal("none");
              pm.expect(jsonData.subscription.proExpiresAt).to.be.oneOf([null, undefined]);
          }
      });
