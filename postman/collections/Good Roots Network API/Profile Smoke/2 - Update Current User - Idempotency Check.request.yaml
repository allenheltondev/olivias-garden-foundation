$kind: http-request
name: 'Update Current User - Idempotency Check (PUT /me)'
description: |-
  Idempotency verification: Re-run PUT /me with the exact same payload.
  
  This request verifies that:
  - The API returns 204 on repeated calls
  - No unintended side effects occur
  
  Per OpenAPI spec: "This endpoint uses upsert semantics. Repeated requests with
  the same payload are safe and will not cause duplicate data."
method: PUT
url: '{{baseUrl}}/me'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "displayName": "Profile Smoke Test User",
      "userType": "grower",
      "growerProfile": {
        "homeZone": "US-TX-Austin",
        "address": "1100 Congress Ave, Austin, TX 78701",
        "shareRadiusMiles": 15,
        "isOrganization": true,
        "organizationName": "Profile Smoke Garden Team",
        "units": "imperial",
        "locale": "en-US"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ============================================
      // PUT /me - Idempotency Verification Tests
      // ============================================

      pm.test("Status code is 204 on repeated PUT", function () {
          pm.response.to.have.status(204);
      });
