$kind: http-request
name: Transition Claim Status
description: |-
  Update the status of a claim.
  
  Supported transitions include:
  - pending -> confirmed
  - pending -> cancelled
  - confirmed -> completed
  - confirmed -> cancelled
  - confirmed -> no_show
method: PUT
url: '{{baseUrl}}/claims/:claimId'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: claimId
    value: '{{claimId}}'
    description: UUID of the claim
body:
  type: json
  content: |-
    {
      "status": "confirmed",
      "notes": "Pickup confirmed for tomorrow at 2pm."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const statusCode = pm.response.code;
      const claimId = pm.collectionVariables.get("claimId");

      pm.test("Status code is 200, 400, or 403", function () {
          pm.expect([200, 400, 403]).to.include(statusCode);
      });

      if (statusCode === 200 && claimId) {
          pm.test("Response reflects updated claim status", function () {
              const claim = pm.response.json();
              pm.expect(claim).to.have.property("id", claimId);
              pm.expect(claim).to.have.property("status", "confirmed");
          });
      }
