$kind: http-request
name: List My Listings
description: Retrieve all listings created by the authenticated user.
method: GET
url: '{{baseUrl}}/my/listings'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
queryParams:
  - key: status
    value: ''
    description: Optional filter: active, expired, completed
    disabled: true
  - key: limit
    value: ''
    description: Optional page size (1-100)
    disabled: true
  - key: offset
    value: ''
    description: Optional offset (0+)
    disabled: true
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response matches paged listing contract", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property("items");
          pm.expect(Array.isArray(response.items)).to.be.true;
          pm.expect(response).to.have.property("limit");
          pm.expect(response).to.have.property("offset");
          pm.expect(response).to.have.property("hasMore");
      });
