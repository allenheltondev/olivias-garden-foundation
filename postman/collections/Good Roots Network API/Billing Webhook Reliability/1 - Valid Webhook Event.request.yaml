$kind: http-request
name: '1 - Valid Webhook Event'
description: Send a signed checkout.session.completed event and assert acknowledgment.
method: POST
url: '{{baseUrl}}/billing/webhook'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Stripe-Signature
    value: '{{stripeSignature}}'
body:
  type: json
  content: |-
    {
      "id": "{{webhookEventId}}",
      "type": "checkout.session.completed",
      "created": 1767225600,
      "data": {
        "object": {
          "id": "cs_ci_{{webhookEventId}}",
          "customer": "cus_ci_webhook",
          "subscription": "sub_ci_webhook",
          "metadata": {
            "user_id": "11111111-1111-4111-8111-111111111111"
          }
        }
      }
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const nowTs = Math.floor(Date.now() / 1000).toString();
      const eventId = `evt_ci_${Date.now()}`;
      pm.collectionVariables.set("webhookEventId", eventId);

      let payload = pm.request.body.raw;
      payload = payload.replace(/{{webhookEventId}}/g, eventId);
      pm.request.body.update(payload);

      const secret = pm.collectionVariables.get("stripeWebhookSecret") || pm.environment.get("stripeWebhookSecret");
      if (!secret) {
          pm.collectionVariables.set("skipBillingWebhookReliability", "true");
          postman.setNextRequest("4 - Missing Signature Rejected");
          return;
      }

      pm.collectionVariables.set("skipBillingWebhookReliability", "false");
      const signedPayload = `${nowTs}.${payload}`;
      const digest = CryptoJS.HmacSHA256(signedPayload, secret).toString(CryptoJS.enc.Hex);
      const header = `t=${nowTs},v1=${digest}`;
      pm.collectionVariables.set("stripeSignature", header);
      pm.request.headers.upsert({ key: "Stripe-Signature", value: header });
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.collectionVariables.get("skipBillingWebhookReliability") === "true") {
          pm.test("Webhook reliability signed checks skipped without secret", function () {
              pm.expect(true).to.be.true;
          });
          return;
      }

      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response acknowledges webhook receipt", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property("received", true);
      });
