$kind: http-request
name: Update Agent Task
description: Update the status of a pro automation task.
method: PUT
url: '{{baseUrl}}/agent-tasks/:taskId'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: taskId
    value: '{{taskId}}'
    description: UUID of the agent task
body:
  type: json
  content: |-
    {
      "status": "paused"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const currentTaskId = pm.collectionVariables.get("taskId");
      if (!currentTaskId) {
          pm.collectionVariables.set("taskId", "00000000-0000-0000-0000-000000000000");
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      const expectFeatureLocked = pm.variables.get("expectFeatureLocked") === "true";

      if (expectFeatureLocked) {
          pm.test("Status code is 403 when feature is locked", function () {
              pm.response.to.have.status(403);
          });

          pm.test("Feature lock response matches entitlement error contract", function () {
              const response = pm.response.json();
              pm.expect(response).to.have.property("error", "feature_locked");
              pm.expect(response).to.have.property("entitlementKey", "agent.tasks.automation");
              pm.expect(response).to.have.property("requiredTier", "pro");
              pm.expect(response).to.have.property("upgradeHintKey", "upgrade.pro");
          });
      } else {
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("Response reflects updated agent task status", function () {
              const task = pm.response.json();
              pm.expect(task).to.have.property("id", pm.collectionVariables.get("taskId"));
              pm.expect(task).to.have.property("status", "paused");
          });
      }

