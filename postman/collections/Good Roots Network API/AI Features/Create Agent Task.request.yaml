$kind: http-request
name: Create Agent Task
description: |-
  Create a new pro automation task.
  
  Pro feature - requires active subscription.
method: POST
url: '{{baseUrl}}/agent-tasks'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Weekly crop planning",
      "scheduleCron": "0 9 * * 1",
      "instruction": "Generate a concise weekly crop planning checklist for my garden."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const expectFeatureLocked = pm.variables.get("expectFeatureLocked") === "true";

      if (expectFeatureLocked) {
          pm.test("Status code is 403 when feature is locked", function () {
              pm.response.to.have.status(403);
          });

          pm.test("Feature lock response matches entitlement error contract", function () {
              const response = pm.response.json();
              pm.expect(response).to.have.property("error", "feature_locked");
              pm.expect(response).to.have.property("entitlementKey", "agent.tasks.automation");
              pm.expect(response).to.have.property("requiredTier", "pro");
              pm.expect(response).to.have.property("upgradeHintKey", "upgrade.pro");
          });
      } else {
          pm.test("Status code is 201", function () {
              pm.response.to.have.status(201);
          });

          pm.test("Response matches agent task contract", function () {
              const task = pm.response.json();
              pm.expect(task).to.have.property("id");
              pm.expect(task).to.have.property("name", "Weekly crop planning");
              pm.expect(task).to.have.property("scheduleCron", "0 9 * * 1");
              pm.expect(task).to.have.property("status", "active");
              pm.collectionVariables.set("taskId", task.id);
          });
      }

