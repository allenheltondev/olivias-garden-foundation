$kind: http-request
name: Get KPIs
description: |-
  Retrieve pro analytics KPIs for the recent rolling window.
  
  Pro feature - requires active subscription.
method: GET
url: '{{baseUrl}}/analytics/pro/kpis'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
queryParams:
  - key: days
    value: '7'
    description: Rolling window in days
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response matches pro KPI contract", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property("windowDays");
          pm.expect(response).to.have.property("funnel");
          pm.expect(response).to.have.property("conversionRate");
      });
