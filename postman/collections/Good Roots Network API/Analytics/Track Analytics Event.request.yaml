$kind: http-request
name: Track Analytics Event
description: |-
  Track a pro analytics event.
  
  Pro feature - requires active subscription.
method: POST
url: '{{baseUrl}}/analytics/pro/events'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "eventName": "checkout_start",
      "metadata": {
        "listingId": "{{listingId}}",
        "source": "discover_feed"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 202", function () {
          pm.response.to.have.status(202);
      });

      pm.test("Response confirms analytics event acceptance", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property("accepted", true);
      });
