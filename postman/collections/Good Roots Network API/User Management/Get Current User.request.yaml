$kind: http-request
name: Get Current User
description: Retrieve the authenticated user's profile information including grower/gatherer profiles.
method: GET
url: '{{baseUrl}}/me'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Authenticated users are bootstrapped instead of returning profile not found", function () {
          pm.response.to.have.status(200);
          const bodyText = pm.response.text();
          pm.expect(bodyText).not.to.include("User profile not found");
      });

      pm.test("Response matches current user contract", function () {
          const user = pm.response.json();
          pm.expect(user).to.have.property("id");
          pm.expect(user).to.have.property("isVerified");
          pm.expect(user).to.have.property("createdAt");
          pm.expect(user).to.have.property("onboardingCompleted");
          pm.collectionVariables.set("myUserId", user.id);
          pm.collectionVariables.set("userId", user.id);
      });

      pm.test("Subscription metadata is present", function () {
          const user = pm.response.json();
          pm.expect(user).to.have.property("subscription");
          pm.expect(user.subscription).to.have.property("tier");
          pm.expect(user.subscription).to.have.property("subscriptionStatus");
          pm.expect(user.subscription.tier).to.be.oneOf(["free", "supporter", "pro"]);
          pm.expect(user.subscription.subscriptionStatus).to.be.oneOf([
              "none",
              "trialing",
              "active",
              "past_due",
              "canceled",
              "incomplete",
              "incomplete_expired",
              "unpaid"
          ]);
      });

      pm.test("Free tier users have no active pro entitlement", function () {
          const user = pm.response.json();
          if (user.subscription.tier === "free") {
              pm.expect(["none", "canceled", "unpaid", "incomplete_expired"]).to.include(user.subscription.subscriptionStatus);
              pm.expect(user.subscription.proExpiresAt).to.be.oneOf([null, undefined]);
          }
      });
