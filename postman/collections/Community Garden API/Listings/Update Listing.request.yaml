$kind: http-request
name: Update Listing
description: Update an existing listing.
method: PUT
url: '{{baseUrl}}/listings/:listingId'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: listingId
    value: '{{listingId}}'
    description: UUID of the listing to update
body:
  type: json
  content: |-
    {
      "title": "Fresh Tomatoes - 3 lb remaining",
      "cropId": "{{catalogCropId}}",
      "quantityTotal": 3,
      "unit": "lb",
      "availableStart": "2026-07-01T08:00:00Z",
      "availableEnd": "2026-07-05T18:00:00Z",
      "pickupLocationText": "Front porch",
      "pickupAddress": "1100 Congress Ave, Austin, TX 78701",
      "pickupDisclosurePolicy": "after_confirmed",
      "pickupNotes": "Ring doorbell, produce will be in cooler on porch",
      "contactPref": "app_message",
      "status": "active"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      let cropId = pm.collectionVariables.get("catalogCropId");
      const fallbackCropId = pm.collectionVariables.get("defaultCatalogCropId");
      const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

      if ((!cropId || !uuidRe.test(cropId)) && fallbackCropId && uuidRe.test(fallbackCropId)) {
          cropId = fallbackCropId;
          pm.collectionVariables.set("catalogCropId", cropId);
      }

      pm.test("catalogCropId is set and valid UUID", function () {
          pm.expect(cropId, "catalogCropId is required").to.be.a("string").and.not.empty;
          pm.expect(cropId).to.match(uuidRe);
      });
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response reflects updated listing", function () {
          const listing = pm.response.json();
          pm.expect(listing).to.have.property("id", pm.collectionVariables.get("listingId"));
          pm.expect(listing).to.have.property("cropId", pm.collectionVariables.get("catalogCropId"));
          pm.expect(listing).to.have.property("quantityTotal");
          pm.expect(Number(listing.quantityTotal)).to.eql(3);
          pm.expect(listing).to.have.property("status", "active");
      });
