$kind: http-request
name: Get My Listing
description: Retrieve a specific listing owned by the authenticated user.
method: GET
url: '{{baseUrl}}/my/listings/:listingId'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
pathVariables:
  - key: listingId
    value: '{{listingId}}'
    description: UUID of the listing
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const listingId = pm.collectionVariables.get("listingId");
      const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

      pm.test("listingId is set and valid UUID", function () {
          pm.expect(listingId, "listingId is required").to.be.a("string").and.not.empty;
          pm.expect(listingId).to.match(uuidRe);
      });

      if (!listingId || !uuidRe.test(listingId)) {
          postman.setNextRequest(null);
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response matches requested listing", function () {
          const listing = pm.response.json();
          pm.expect(listing).to.have.property("id", pm.collectionVariables.get("listingId"));
          pm.expect(listing).to.have.property("cropId");
          pm.expect(listing).to.have.property("status");
      });
