$kind: http-request
name: List Agent Tasks
description: |-
  List premium automation tasks for the authenticated user.
  
  Premium feature - requires active subscription.
method: GET
url: '{{baseUrl}}/agent-tasks'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response matches agent task list contract", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property("items");
          pm.expect(Array.isArray(response.items)).to.be.true;
      });

