$kind: http-request
name: '3 - Unknown Event Type'
description: Send a signed unsupported event and verify graceful acknowledgement.
method: POST
url: '{{baseUrl}}/billing/webhook'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Stripe-Signature
    value: '{{stripeSignature}}'
body:
  type: json
  content: |-
    {
      "id": "evt_ci_unknown_{{timestamp}}",
      "type": "invoice.payment_failed",
      "created": 1767225601,
      "data": {
        "object": {
          "id": "in_ci_unknown"
        }
      }
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const ts = Date.now().toString();
      pm.collectionVariables.set("timestamp", ts);

      let payload = pm.request.body.raw;
      payload = payload.replace(/{{timestamp}}/g, ts);
      pm.request.body.update(payload);

      if (pm.collectionVariables.get("skipBillingWebhookReliability") === "true") {
          postman.setNextRequest("4 - Missing Signature Rejected");
          return;
      }

      const nowTs = Math.floor(Date.now() / 1000).toString();
      const secret = pm.collectionVariables.get("stripeWebhookSecret") || pm.environment.get("stripeWebhookSecret");
      if (!secret) {
          pm.collectionVariables.set("skipBillingWebhookReliability", "true");
          postman.setNextRequest("4 - Missing Signature Rejected");
          return;
      }

      const signedPayload = `${nowTs}.${payload}`;
      const digest = CryptoJS.HmacSHA256(signedPayload, secret).toString(CryptoJS.enc.Hex);
      const header = `t=${nowTs},v1=${digest}`;
      pm.request.headers.upsert({ key: "Stripe-Signature", value: header });
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.collectionVariables.get("skipBillingWebhookReliability") === "true") {
          pm.test("Webhook reliability signed checks skipped without secret", function () {
              pm.expect(true).to.be.true;
          });
          return;
      }

      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Unsupported signed event is acknowledged", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property("received", true);
      });
