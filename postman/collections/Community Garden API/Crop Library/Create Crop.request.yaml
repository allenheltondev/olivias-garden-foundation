$kind: http-request
name: Create Crop
description: Add a new crop to the user's crop library.
method: POST
url: '{{baseUrl}}/crops'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "crop_id": "{{catalogCropId}}",
      "status": "growing",
      "visibility": "local",
      "surplus_enabled": true,
      "nickname": "My Heirloom Tomatoes",
      "notes": "Planted in raised bed #2"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      let cropId = pm.collectionVariables.get("catalogCropId");
      const fallbackCropId = pm.collectionVariables.get("defaultCatalogCropId");
      const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

      if ((!cropId || !uuidRe.test(cropId)) && fallbackCropId && uuidRe.test(fallbackCropId)) {
          cropId = fallbackCropId;
          pm.collectionVariables.set("catalogCropId", cropId);
      }

      pm.test("catalogCropId is set and valid UUID", function () {
          pm.expect(cropId, "catalogCropId is required").to.be.a("string").and.not.empty;
          pm.expect(cropId).to.match(uuidRe);
      });
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Response matches grower crop contract", function () {
          const crop = pm.response.json();
          pm.expect(crop).to.have.property("id");
          pm.expect(crop).to.have.property("crop_id");
          pm.expect(crop).to.have.property("status", "growing");
          pm.expect(crop).to.have.property("visibility", "local");
          pm.expect(crop).to.have.property("surplus_enabled", true);
          pm.collectionVariables.set("cropLibraryId", crop.id);
      });
