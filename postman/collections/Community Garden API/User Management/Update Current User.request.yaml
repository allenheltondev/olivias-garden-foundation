$kind: http-request
name: Update Current User
description: |-
  Create or update the authenticated user's profile. Supports both grower and gatherer profile types.
  Returns 204 No Content on success.
  
  User Types:
  - grower: Users who grow food and share surplus
  - gatherer: Users who look for and collect available food
method: PUT
url: '{{baseUrl}}/me'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "displayName": "John Gardener",
      "userType": "grower",
      "growerProfile": {
        "homeZone": "US-TX-Austin",
        "address": "1100 Congress Ave, Austin, TX 78701",
        "shareRadiusMiles": 10,
        "units": "imperial",
        "locale": "en-US"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
