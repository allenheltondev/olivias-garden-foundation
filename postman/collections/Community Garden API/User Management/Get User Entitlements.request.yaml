$kind: http-request
name: Get User Entitlements
description: Retrieve the current user's entitlements and feature access based on their subscription tier.
method: GET
url: '{{baseUrl}}/me/entitlements'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response matches entitlements contract", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property("tier");
          pm.expect(response).to.have.property("entitlementsVersion");
          pm.expect(response).to.have.property("entitlements");
          pm.expect(Array.isArray(response.entitlements)).to.be.true;
          pm.expect(response).to.have.property("policy");
      });
