$kind: http-request
name: List Claims
description: |-
  Retrieve claims for the authenticated user.
  
  For growers: Shows claims on their listings
  For gatherers: Shows claims they have made
method: GET
url: '{{baseUrl}}/claims'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
queryParams:
  - key: status
    value: ''
    description: Filter by claim status (pending, confirmed, completed, cancelled, no_show)
    disabled: true
  - key: listingId
    value: ''
    description: Optional listing scope filter
    disabled: true
  - key: requestId
    value: ''
    description: Optional request scope filter
    disabled: true
  - key: limit
    value: ''
    description: Optional page size (1-100)
    disabled: true
  - key: offset
    value: ''
    description: Optional offset (0+)
    disabled: true
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response matches claim list contract", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property("items");
          pm.expect(Array.isArray(response.items)).to.be.true;
          pm.expect(response).to.have.property("limit");
          pm.expect(response).to.have.property("offset");
          pm.expect(response).to.have.property("hasMore");
      });
