$kind: http-request
name: 'Step 3 - Create Listing'
description: |-
  Grower creates a listing for the cross-endpoint consistency flow.

  **Depends on**: `authToken` set to grower token, `catalogCropId` available
  **Chaining**: Captures `consistencyListingId` and `consistencyListingStatus` from the response.
method: POST
url: '{{baseUrl}}/listings'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Consistency E2E Listing",
      "cropId": "{{catalogCropId}}",
      "quantityTotal": 4,
      "unit": "lb",
      "availableStart": "2026-07-01T08:00:00Z",
      "availableEnd": "2026-07-03T18:00:00Z",
      "pickupLocationText": "Front porch",
      "status": "active"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      // Validate catalogCropId with fallback
      let cropId = pm.collectionVariables.get("catalogCropId");
      const fallbackCropId = pm.collectionVariables.get("defaultCatalogCropId");
      const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

      if ((!cropId || !uuidRe.test(cropId)) && fallbackCropId && uuidRe.test(fallbackCropId)) {
          cropId = fallbackCropId;
          pm.collectionVariables.set("catalogCropId", cropId);
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Capture consistencyListingId and consistencyListingStatus", function () {
          const listing = pm.response.json();
          pm.expect(listing).to.have.property("id");

          if (!listing.id) {
              pm.expect.fail("Missing listing.id; aborting chained run.");
              pm.execution.setNextRequest(null);
              return;
          }

          pm.collectionVariables.set("consistencyListingId", listing.id);
          pm.collectionVariables.set("consistencyListingStatus", listing.status || "active");
      });
