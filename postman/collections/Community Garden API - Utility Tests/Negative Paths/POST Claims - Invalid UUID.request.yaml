$kind: http-request
name: 'POST /claims - Invalid UUID listingId'
description: |-
  Sends a POST /claims request with `listingId` set to "not-a-uuid",
  which is not a valid UUID format.
  Expects a 400 status code.
method: POST
url: '{{baseUrl}}/claims'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{gathererAuthToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "listingId": "not-a-uuid",
      "quantityClaimed": 1,
      "notes": "Negative path test - invalid UUID"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response contains error property", function () {
          const body = pm.response.json();
          pm.expect(body).to.have.property("error");
      });
