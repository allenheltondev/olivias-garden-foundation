$kind: http-request
name: 'Free - GET /analytics/premium/kpis → 403'
description: |-
  Verifies that a free-tier token is rejected with 403 feature_locked
  when calling the premium analytics KPIs endpoint.
method: GET
url: '{{baseUrl}}/analytics/premium/kpis'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.collectionVariables.set("authToken", pm.collectionVariables.get("freeAuthToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 403", function () {
          pm.response.to.have.status(403);
      });

      pm.test("Response contains feature_locked error with correct entitlement fields", function () {
          const body = pm.response.json();
          pm.expect(body).to.have.property("error", "feature_locked");
          pm.expect(body).to.have.property("entitlementKey").that.is.a("string");
          pm.expect(body).to.have.property("requiredTier", "premium");
          pm.expect(body).to.have.property("upgradeHintKey").that.is.a("string");
      });
