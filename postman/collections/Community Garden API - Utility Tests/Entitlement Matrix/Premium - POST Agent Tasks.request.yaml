$kind: http-request
name: 'Premium - POST /agent-tasks → non-403'
description: |-
  Verifies that a premium-tier token is NOT rejected with 403
  when calling the agent tasks creation endpoint.
method: POST
url: '{{baseUrl}}/agent-tasks'
order: 7000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "taskType": "weekly_plan",
      "input": {"prompt": "test"}
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.collectionVariables.set("authToken", pm.collectionVariables.get("premiumAuthToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is not 403", function () {
          pm.expect(pm.response.code).to.not.equal(403);
      });
