$kind: http-request
name: 'Premium - POST /analytics/premium/events → non-403'
description: |-
  Verifies that a pro-tier token is NOT rejected with 403
  when calling the pro analytics event tracking endpoint.
method: POST
url: '{{baseUrl}}/analytics/pro/events'
order: 9000
headers:
  - key: Authorization
    value: 'Bearer {{premiumAuthToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "eventName": "paywall_view",
      "metadata": {}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is not 403", function () {
          pm.expect(pm.response.code).to.not.equal(403);
      });
