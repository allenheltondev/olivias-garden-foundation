$kind: http-request
name: 'Premium - POST /ai/copilot/weekly-plan → non-403'
description: |-
  Verifies that a premium-tier token is NOT rejected with 403
  when calling the AI weekly plan endpoint.
method: POST
url: '{{baseUrl}}/ai/copilot/weekly-plan'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{premiumAuthToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "geoKey": "9v6kn7",
      "windowDays": 7
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is not 403", function () {
          pm.expect(pm.response.code).to.not.equal(403);
      });
