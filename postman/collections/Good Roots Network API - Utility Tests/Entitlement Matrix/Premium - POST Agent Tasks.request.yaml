$kind: http-request
name: 'Premium - POST /agent-tasks → non-403'
description: |-
  Verifies that a pro-tier token is NOT rejected with 403
  when calling the agent tasks creation endpoint.
method: POST
url: '{{baseUrl}}/agent-tasks'
order: 7000
headers:
  - key: Authorization
    value: 'Bearer {{premiumAuthToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Task",
      "scheduleCron": "0 8 * * 1",
      "instruction": "Test instruction for entitlement check"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is not 403", function () {
          pm.expect(pm.response.code).to.not.equal(403);
      });
