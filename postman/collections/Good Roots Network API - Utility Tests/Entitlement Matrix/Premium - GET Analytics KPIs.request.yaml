$kind: http-request
name: 'Premium - GET /analytics/premium/kpis → non-403'
description: |-
  Verifies that a pro-tier token is NOT rejected with 403
  when calling the pro analytics KPIs endpoint.
method: GET
url: '{{baseUrl}}/analytics/pro/kpis'
order: 10000
headers:
  - key: Authorization
    value: 'Bearer {{premiumAuthToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is not 403", function () {
          pm.expect(pm.response.code).to.not.equal(403);
      });
