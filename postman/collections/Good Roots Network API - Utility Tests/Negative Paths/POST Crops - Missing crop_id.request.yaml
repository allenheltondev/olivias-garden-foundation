$kind: http-request
name: 'POST /crops - Missing crop reference'
description: |-
  Sends a POST /crops request with both `canonical_id` and `crop_name` omitted.
  Expects a 400 status code and the current validation message in the response body.
method: POST
url: '{{baseUrl}}/crops'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{premiumAuthToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "growing",
      "visibility": "local",
      "surplus_enabled": false
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response contains error property", function () {
          const body = pm.response.json();
          pm.expect(body).to.have.property("error");
          pm.expect(body.error).to.include("crop_name is required when canonical_id is not provided");
      });
