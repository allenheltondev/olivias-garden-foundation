$kind: http-request
name: 'POST /reminders - Missing title'
description: |-
  Sends a POST /reminders request with the `title` field omitted.
  Expects a 400 status code because title is a required field.
method: POST
url: '{{baseUrl}}/reminders'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{premiumAuthToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "reminderType": "watering",
      "cadenceDays": 3,
      "startDate": "2026-07-02",
      "timezone": "America/Chicago"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response contains error property", function () {
          const body = pm.response.json();
          pm.expect(body).to.have.property("error");
      });
