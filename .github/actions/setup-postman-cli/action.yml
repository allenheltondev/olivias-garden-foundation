name: Setup Postman CLI
description: Install and authenticate the Postman CLI.

inputs:
  api-key:
    description: Postman API key used for CLI authentication.
    required: true

runs:
  using: composite
  steps:
    - name: Install Postman CLI
      shell: bash
      run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

    - name: Login to Postman CLI
      shell: bash
      run: postman login --with-api-key "${{ inputs.api-key }}"
