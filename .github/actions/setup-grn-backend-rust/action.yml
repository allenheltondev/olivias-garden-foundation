name: Setup GRN Backend Rust
description: Setup the Rust toolchain and Cargo cache for the GRN backend.

inputs:
  components:
    description: Optional comma-separated rustup components to install.
    required: false
    default: ""
  install-postgres-client:
    description: Install the PostgreSQL client tools.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: ${{ inputs.components }}

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          services/grn-api/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('services/grn-api/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install PostgreSQL client
      if: ${{ inputs.install-postgres-client == 'true' }}
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y postgresql-client
