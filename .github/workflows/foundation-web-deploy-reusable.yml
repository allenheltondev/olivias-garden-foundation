name: Foundation Web Deploy Reusable

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      foundation_web_stack_name:
        required: true
        type: string
      web_api_stack_name:
        required: true
        type: string
      okra_stack_name:
        required: true
        type: string
      grn_stack_name:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: us-east-1
      aws_role_session_name:
        required: true
        type: string
      domain_name:
        required: false
        type: string
        default: ""
      domain_hosted_zone_id:
        required: false
        type: string
        default: ""
      stripe_event_bus_name:
        required: false
        type: string
        default: ""
      stripe_publishable_key:
        required: false
        type: string
        default: ""
    secrets:
      aws_role_arn:
        required: true
      database_url:
        required: true
      signup_slack_webhook_url:
        required: false
      web_stripe_secret_key:
        required: false
      web_donation_slack_webhook_url:
        required: false
    outputs:
      web-app-url:
        description: Foundation Web app URL
        value: ${{ jobs.deploy.outputs.web-app-url }}
      frontend-url:
        description: Foundation Web frontend URL
        value: ${{ jobs.deploy.outputs.frontend-url }}
      web-api-url:
        description: Web API URL
        value: ${{ jobs.deploy.outputs.web-api-url }}
      frontend-bucket:
        description: Foundation Web frontend bucket
        value: ${{ jobs.deploy.outputs.frontend-bucket }}
      cloudfront-distribution-id:
        description: Foundation Web CloudFront distribution ID
        value: ${{ jobs.deploy.outputs.cloudfront-distribution-id }}
      ci-admin-username:
        description: Cognito username of the deploy-rotated CI admin user (non-secret)
        value: ${{ jobs.deploy.outputs.ci-admin-username }}
      ci-admin-password:
        description: Cognito password of the deploy-rotated CI admin user (masked)
        value: ${{ jobs.deploy.outputs.ci-admin-password }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Foundation Web
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ steps.stack-outputs.outputs.web-app-url }}
    concurrency:
      group: foundation-stack-${{ inputs.foundation_web_stack_name }}
      cancel-in-progress: false
    outputs:
      web-app-url: ${{ steps.stack-outputs.outputs.web-app-url }}
      frontend-url: ${{ steps.stack-outputs.outputs.frontend-url }}
      frontend-bucket: ${{ steps.stack-outputs.outputs.frontend-bucket }}
      cloudfront-distribution-id: ${{ steps.stack-outputs.outputs.cloudfront-distribution-id }}
      web-api-url: ${{ steps.web-api-stack.outputs.api-url }}
      ci-admin-username: ${{ steps.okra-ci-auth.outputs.username }}
      ci-admin-password: ${{ steps.okra-ci-auth.outputs.password }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          role-session-name: ${{ inputs.aws_role_session_name }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Setup Node.js for foundation function build
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            infra/foundation-web/package-lock.json
            package-lock.json

      - name: Install esbuild for SAM
        run: npm install -g esbuild

      - name: Install foundation infrastructure dependencies
        working-directory: infra/foundation-web
        run: npm ci --ignore-scripts

      - name: Download web-api SAM build artifact
        uses: actions/download-artifact@v4
        with:
          name: foundation-web-api-sam-build
          path: services/web-api/.aws-sam/build
          if-no-files-found: ignore

      - name: Detect downloaded web-api build artifact
        id: web-api-build-artifact
        shell: bash
        run: |
          if [ -f services/web-api/.aws-sam/build/template.yaml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install web-api dependencies
        if: steps.web-api-build-artifact.outputs.available != 'true'
        run: npm ci --workspace @olivias/web-api --ignore-scripts

      - name: Validate custom domain configuration
        env:
          ENVIRONMENT_NAME: ${{ inputs.environment_name }}
          DOMAIN_NAME: ${{ inputs.domain_name }}
          DOMAIN_HOSTED_ZONE_ID: ${{ inputs.domain_hosted_zone_id }}
        run: |
          if [ -n "$DOMAIN_NAME" ] && [ -z "$DOMAIN_HOSTED_ZONE_ID" ]; then
            echo "Foundation Web domain_name is set but domain_hosted_zone_id is missing."
            exit 1
          fi

          if [ -z "$DOMAIN_NAME" ] && [ -n "$DOMAIN_HOSTED_ZONE_ID" ]; then
            echo "Foundation Web domain_hosted_zone_id is set but domain_name is missing."
            exit 1
          fi

          if [ "$ENVIRONMENT_NAME" = "prod" ] && [ -z "$DOMAIN_NAME" ]; then
            echo "Production Foundation Web deploys require FOUNDATION_WEB_DOMAIN_NAME_PROD and FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_PROD."
            exit 1
          fi

      - name: Deploy shared foundation web stack
        env:
          DOMAIN_NAME: ${{ inputs.domain_name }}
          DOMAIN_HOSTED_ZONE_ID: ${{ inputs.domain_hosted_zone_id }}
          DATABASE_URL: ${{ secrets.database_url }}
          SIGNUP_SLACK_WEBHOOK_URL: ${{ secrets.signup_slack_webhook_url }}
        run: |
          PARAM_OVERRIDES=(
            "EnvironmentName=${{ inputs.environment_name }}"
            "DatabaseUrl=$DATABASE_URL"
          )
          if [ -n "$DOMAIN_NAME" ] && [ -n "$DOMAIN_HOSTED_ZONE_ID" ]; then
            PARAM_OVERRIDES+=("DomainName=$DOMAIN_NAME" "DomainHostedZoneId=$DOMAIN_HOSTED_ZONE_ID")
          fi
          if [ -n "$SIGNUP_SLACK_WEBHOOK_URL" ]; then
            PARAM_OVERRIDES+=("SignupSlackWebhookUrl=$SIGNUP_SLACK_WEBHOOK_URL")
          fi

          sam deploy \
            --debug \
            --template-file infra/foundation-web/template.yaml \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --resolve-s3 \
            --s3-prefix "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Run web-api database migrations
        working-directory: services/web-api
        env:
          DATABASE_URL: ${{ secrets.database_url }}
        run: |
          chmod +x ./db/migrate.sh
          ./db/migrate.sh

      - name: Build web-api
        if: steps.web-api-build-artifact.outputs.available != 'true'
        run: sam build --template-file services/web-api/template.yaml --build-dir services/web-api/.aws-sam/build

      - name: Deploy web-api stack
        env:
          DATABASE_URL: ${{ secrets.database_url }}
          DOMAIN_NAME: ${{ inputs.domain_name }}
          DOMAIN_HOSTED_ZONE_ID: ${{ inputs.domain_hosted_zone_id }}
          STRIPE_SECRET_KEY: ${{ secrets.web_stripe_secret_key }}
          STRIPE_EVENT_BUS_NAME: ${{ inputs.stripe_event_bus_name }}
          DONATION_SLACK_WEBHOOK_URL: ${{ secrets.web_donation_slack_webhook_url }}
        run: |
          PARAM_OVERRIDES=(
            "DatabaseUrl=$DATABASE_URL"
            "EnvironmentName=${{ inputs.environment_name }}"
            "StripeSecretKey=$STRIPE_SECRET_KEY"
          )
          if [ -n "$DOMAIN_NAME" ] && [ -n "$DOMAIN_HOSTED_ZONE_ID" ]; then
            PARAM_OVERRIDES+=("DomainName=$DOMAIN_NAME" "DomainHostedZoneId=$DOMAIN_HOSTED_ZONE_ID")
          fi
          if [ -n "$STRIPE_EVENT_BUS_NAME" ]; then
            PARAM_OVERRIDES+=("StripeEventBusName=$STRIPE_EVENT_BUS_NAME")
          fi
          if [ -n "$DONATION_SLACK_WEBHOOK_URL" ]; then
            PARAM_OVERRIDES+=("DonationSlackWebhookUrl=$DONATION_SLACK_WEBHOOK_URL")
          fi

          sam deploy \
            --template-file services/web-api/.aws-sam/build/template.yaml \
            --stack-name "${{ inputs.web_api_stack_name }}" \
            --resolve-s3 \
            --s3-prefix "${{ inputs.web_api_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Diagnose failed foundation deploy
        if: ${{ failure() }}
        run: |
          echo "Foundation deploy failed. Dumping CloudFormation diagnostics for ${{ inputs.foundation_web_stack_name }}."

          echo "==== describe-stacks ===="
          aws cloudformation describe-stacks \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" || true

          echo "==== describe-stack-events (latest 50) ===="
          aws cloudformation describe-stack-events \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "StackEvents[:50].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
            --output table || true

          echo "==== list-stack-resources ===="
          aws cloudformation list-stack-resources \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "StackResourceSummaries[*].[LogicalResourceId,ResourceType,ResourceStatus,PhysicalResourceId]" \
            --output table || true

          echo "==== list-change-sets (latest 5) ===="
          aws cloudformation list-change-sets \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "sort_by(Summaries,&CreationTime)[-5:].[ChangeSetName,Status,ExecutionStatus,StatusReason,CreationTime]" \
            --output table || true

          LATEST_CHANGE_SET=$(aws cloudformation list-change-sets \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "sort_by(Summaries,&CreationTime)[-1].ChangeSetName" \
            --output text 2>/dev/null || true)

          if [ -n "$LATEST_CHANGE_SET" ] && [ "$LATEST_CHANGE_SET" != "None" ]; then
            echo "==== describe-change-set ($LATEST_CHANGE_SET) ===="
            aws cloudformation describe-change-set \
              --stack-name "${{ inputs.foundation_web_stack_name }}" \
              --change-set-name "$LATEST_CHANGE_SET" \
              --region "${{ inputs.aws_region }}" || true
          fi

      - name: Read stack outputs
        id: stack-outputs
        run: |
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebFrontendUrl'].OutputValue" \
            --output text)

          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebFrontendBucketName'].OutputValue" \
            --output text)

          CLOUDFRONT_DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.foundation_web_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebFrontendDistributionId'].OutputValue" \
            --output text)

          USER_POOL_ID=$(aws cloudformation list-exports \
            --region "${{ inputs.aws_region }}" \
            --query "Exports[?Name=='OGF-UserPoolId'].Value | [0]" \
            --output text)

          USER_POOL_CLIENT_ID=$(aws cloudformation list-exports \
            --region "${{ inputs.aws_region }}" \
            --query "Exports[?Name=='OGF-UserPoolClientId'].Value | [0]" \
            --output text)

          USER_POOL_DOMAIN=$(aws cloudformation list-exports \
            --region "${{ inputs.aws_region }}" \
            --query "Exports[?Name=='OGF-UserPoolDomain'].Value | [0]" \
            --output text)

          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "web-app-url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront-distribution-id=$CLOUDFRONT_DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "user-pool-domain=$USER_POOL_DOMAIN" >> $GITHUB_OUTPUT

      - name: Publish deployment summary
        run: |
          {
            echo "## Foundation Web Deployment"
            echo
            echo "- Environment: \`${{ inputs.environment_name }}\`"
            echo "- Web app URL: ${{ steps.stack-outputs.outputs.web-app-url }}"
            echo "- Web API URL: ${{ steps.web-api-stack.outputs.api-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js for okra deploy
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/okra-api/package-lock.json

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Install okra backend dependencies
        working-directory: services/okra-api
        run: npm ci --workspaces=false --ignore-scripts

      - name: Generate okra CI auth credentials
        id: okra-ci-auth
        run: |
          echo "username=okra-ci-admin+${{ inputs.environment_name }}@ogf.local" >> "$GITHUB_OUTPUT"
          PASSWORD=$(python -c "import secrets; print(f'OgF{secrets.token_hex(12)}!9a')")
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Deploy okra backend stack
        working-directory: services/okra-api
        env:
          OKRA_DATABASE_URL: ${{ secrets.database_url }}
          OKRA_CI_ADMIN_USERNAME: ${{ steps.okra-ci-auth.outputs.username }}
          OKRA_CI_ADMIN_PASSWORD: ${{ steps.okra-ci-auth.outputs.password }}
          FOUNDATION_DOMAIN_NAME: ${{ inputs.domain_name }}
          SLACK_WEBHOOK_URL: ${{ secrets.signup_slack_webhook_url }}
        run: |
          sam build
          PARAM_OVERRIDES=(
            "DatabaseUrl=$OKRA_DATABASE_URL"
            "CiAdminUsername=$OKRA_CI_ADMIN_USERNAME"
            "CiAdminPassword=$OKRA_CI_ADMIN_PASSWORD"
          )
          if [ -n "$FOUNDATION_DOMAIN_NAME" ]; then
            PARAM_OVERRIDES+=("DomainName=$FOUNDATION_DOMAIN_NAME")
          fi
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            PARAM_OVERRIDES+=("SlackWebhookUrl=$SLACK_WEBHOOK_URL")
          fi
          sam deploy \
            --stack-name "${{ inputs.okra_stack_name }}" \
            --resolve-s3 \
            --s3-prefix "${{ inputs.okra_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Read okra stack outputs
        id: okra-stack
        run: |
          OKRA_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.okra_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "Stacks[0].Outputs[?OutputKey=='HttpApiUrl'].OutputValue" \
            --output text)
          echo "api-url=$OKRA_API_URL" >> $GITHUB_OUTPUT

      - name: Read web-api stack outputs
        id: web-api-stack
        run: |
          WEB_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.web_api_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api-url=$WEB_API_URL" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Read GRN stack frontend URL
        id: grn-stack
        run: |
          GRN_FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.grn_stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text 2>/dev/null || echo "")
          echo "frontend-url=$GRN_FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Build foundation web app
        env:
          VITE_OKRA_API_BASE: ${{ steps.okra-stack.outputs.api-url }}
          VITE_AUTH_USER_POOL_ID: ${{ steps.stack-outputs.outputs.user-pool-id }}
          VITE_AUTH_USER_POOL_CLIENT_ID: ${{ steps.stack-outputs.outputs.user-pool-client-id }}
          VITE_AUTH_USER_POOL_DOMAIN: ${{ steps.stack-outputs.outputs.user-pool-domain }}
          VITE_GRN_URL: ${{ steps.grn-stack.outputs.frontend-url }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ inputs.stripe_publishable_key }}
          VITE_WEB_API_BASE: ${{ steps.web-api-stack.outputs.api-url }}
        run: npm --workspace @olivias/web run build

      - name: Deploy frontend assets to S3
        run: |
          aws s3 sync apps/web/dist/ "s3://${{ steps.stack-outputs.outputs.frontend-bucket }}/" \
            --region "${{ inputs.aws_region }}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "manifest.json"

          aws s3 cp apps/web/dist/index.html "s3://${{ steps.stack-outputs.outputs.frontend-bucket }}/index.html" \
            --region "${{ inputs.aws_region }}" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          if [ -f "apps/web/dist/manifest.json" ]; then
            aws s3 cp apps/web/dist/manifest.json "s3://${{ steps.stack-outputs.outputs.frontend-bucket }}/manifest.json" \
              --region "${{ inputs.aws_region }}" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "application/json"
          fi

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID="${{ steps.stack-outputs.outputs.cloudfront-distribution-id }}"
          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
          fi
