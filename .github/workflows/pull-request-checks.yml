name: Repository Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: repository-pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VITE_USER_POOL_ID: placeholder
  VITE_USER_POOL_CLIENT_ID: placeholder
  VITE_USER_POOL_DOMAIN: placeholder.auth.us-east-1.amazoncognito.com
  VITE_API_URL: https://placeholder.execute-api.us-east-1.amazonaws.com
  VITE_FRONTEND_URL: https://placeholder.cloudfront.net
  VITE_AWS_REGION: us-east-1
  VITE_FOUNDATION_URL: https://placeholder.cloudfront.net
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changed Paths
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      shared_all: ${{ steps.filter.outputs.shared_all }}
      grn_backend: ${{ steps.filter.outputs.grn_backend }}
      grn_frontend: ${{ steps.filter.outputs.grn_frontend }}
      okra_backend: ${{ steps.filter.outputs.okra_backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared_all:
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - '.gitignore'
              - 'scripts/**'
            grn_backend:
              - 'services/grn-api/**'
              - 'postman/**'
              - 'docs/testing/postman-e2e-rollout.md'
            grn_frontend:
              - 'apps/grn/**'
              - 'packages/**'
            okra_backend:
              - 'services/okra-api/**'

  backend-static:
    name: GRN Backend Static Checks
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_backend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/grn-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GRN backend Rust
        uses: ./.github/actions/setup-grn-backend-rust
        with:
          components: rustfmt,clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run cargo check
        run: cargo check --all-targets --all-features

  backend-tests:
    name: GRN Backend Tests
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_backend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grn_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/grn-api
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/grn_ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GRN backend Rust
        uses: ./.github/actions/setup-grn-backend-rust
        with:
          install-postgres-client: 'true'

      - name: Run database migrations
        run: ./db/migrate.sh

      - name: Run unit tests
        run: cargo test --bins --all-features

      - name: Run integration tests
        run: cargo test --test integration_test

  frontend-lint:
    name: GRN Frontend Lint
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_frontend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/grn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup frontend dependencies
        uses: ./.github/actions/setup-grn-frontend

      - name: Run ESLint
        run: npm run lint

  frontend-typecheck:
    name: GRN Frontend Type Check
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_frontend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/grn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup frontend dependencies
        uses: ./.github/actions/setup-grn-frontend

      - name: Type check
        run: npm run typecheck

  frontend-unit-tests:
    name: GRN Frontend Unit Tests
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_frontend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/grn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup frontend dependencies
        uses: ./.github/actions/setup-grn-frontend
        with:
          install-esbuild: 'true'

      - name: Run tests
        run: npm test

  frontend-build:
    name: GRN Frontend Build Check
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_frontend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/grn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup frontend dependencies
        uses: ./.github/actions/setup-grn-frontend

      - name: Build check
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: grn-frontend-dist
          path: apps/grn/dist
          if-no-files-found: error

  frontend-performance-budget:
    name: GRN Frontend Performance Budget
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_frontend == 'true')
    needs: [changes, frontend-build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/grn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup frontend dependencies
        uses: ./.github/actions/setup-grn-frontend

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: grn-frontend-dist
          path: apps/grn/dist

      - name: Performance budget check
        run: npm run perf:budget

  backend-functions-tests:
    name: GRN Backend Functions (Node.js) Lint & Tests
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_backend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install lint dependencies
        working-directory: services/grn-api
        run: npm install

      - name: Lint backend functions
        working-directory: services/grn-api
        run: npm run lint

      - name: Run backend function tests
        working-directory: services/grn-api
        run: npm test

  okra-backend-lint:
    name: Okra Backend Lint
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.okra_backend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/okra-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Okra backend dependencies
        uses: ./.github/actions/setup-okra-backend

      - name: Run ESLint
        run: npm run lint

  okra-backend-typecheck:
    name: Okra Backend Type Check
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.okra_backend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/okra-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Okra backend dependencies
        uses: ./.github/actions/setup-okra-backend

      - name: Type check
        run: npm run typecheck

  okra-backend-tests:
    name: Okra Backend Tests
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.okra_backend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/okra-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Okra backend dependencies
        uses: ./.github/actions/setup-okra-backend

      - name: Run tests
        run: npm test

  okra-backend-build:
    name: Okra Backend Build
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.okra_backend == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/okra-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Okra backend dependencies
        uses: ./.github/actions/setup-okra-backend
        with:
          setup-sam: 'true'

      - name: Build check
        run: npm run build

  ci-summary:
    name: Repository CI Summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend-static
      - backend-tests
      - backend-functions-tests
      - frontend-lint
      - frontend-typecheck
      - frontend-unit-tests
      - frontend-build
      - frontend-performance-budget
      - okra-backend-lint
      - okra-backend-typecheck
      - okra-backend-tests
      - okra-backend-build
    if: always() && github.event.action != 'closed'

    steps:
      - name: Check all CI jobs
        run: |
          check_result() {
            local job_name="$1"
            local result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$job_name failed with result: $result"
              exit 1
            fi
          }

          check_result "backend-static" "${{ needs.backend-static.result }}"
          check_result "backend-tests" "${{ needs.backend-tests.result }}"
          check_result "backend-functions-tests" "${{ needs.backend-functions-tests.result }}"
          check_result "frontend-lint" "${{ needs.frontend-lint.result }}"
          check_result "frontend-typecheck" "${{ needs.frontend-typecheck.result }}"
          check_result "frontend-unit-tests" "${{ needs.frontend-unit-tests.result }}"
          check_result "frontend-build" "${{ needs.frontend-build.result }}"
          check_result "frontend-performance-budget" "${{ needs.frontend-performance-budget.result }}"
          check_result "okra-backend-lint" "${{ needs.okra-backend-lint.result }}"
          check_result "okra-backend-typecheck" "${{ needs.okra-backend-typecheck.result }}"
          check_result "okra-backend-tests" "${{ needs.okra-backend-tests.result }}"
          check_result "okra-backend-build" "${{ needs.okra-backend-build.result }}"

          echo "All applicable CI checks passed"

  staging-validation:
    name: PR Staging Deploy And Validation
    needs: [changes, ci-summary]
    if: github.event.action != 'closed' && (needs.changes.outputs.shared_all == 'true' || needs.changes.outputs.grn_backend == 'true' || needs.changes.outputs.grn_frontend == 'true' || needs.changes.outputs.okra_backend == 'true')
    uses: ./.github/workflows/pull-request-staging-validation-reusable.yml
    with:
      shared_all: ${{ needs.changes.outputs.shared_all }}
      grn_backend: ${{ needs.changes.outputs.grn_backend }}
      grn_frontend: ${{ needs.changes.outputs.grn_frontend }}
      okra_backend: ${{ needs.changes.outputs.okra_backend }}
      pr_number: ${{ github.event.pull_request.number }}
    secrets:
      aws_staging_role_arn: ${{ secrets.AWS_STAGING_ROLE_ARN }}
      database_url_staging: ${{ secrets.DATABASE_URL_STAGING }}
      postman_api_key: ${{ secrets.POSTMAN_API_KEY }}
      stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      foundation_signup_slack_webhook_url_staging: ${{ secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}
