name: Deploy Foundation Web

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'services/web-api/**'
      - 'packages/ui/**'
      - 'infra/foundation-web/**'
      - '.github/workflows/web-*.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'tsconfig.base.json'
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: foundation-web-deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  FOUNDATION_WEB_STACK_NAME: ogf-web-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  OKRA_STACK_NAME: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && 'ogf-okra-prod' || 'ogf-okra-staging' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: Foundation Web Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Validate root template
        run: cfn-lint infra/foundation-web/template.yaml

      - name: Validate web-api template
        run: cfn-lint services/web-api/template.yaml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm --workspace @olivias/web run typecheck

      - name: Build foundation web app
        run: npm --workspace @olivias/web run build

      - name: Install foundation infrastructure dependencies
        working-directory: infra/foundation-web
        run: npm ci --ignore-scripts

      - name: Run foundation function tests
        working-directory: infra/foundation-web
        run: npm test

      - name: Run web-api typecheck
        run: npm --workspace @olivias/web-api run typecheck

      - name: Run web-api lint
        run: npm --workspace @olivias/web-api run lint

      - name: Run web-api tests
        run: npm --workspace @olivias/web-api run test

  deploy:
    name: Deploy Foundation Web
    needs: [checks]
    uses: ./.github/workflows/foundation-web-deploy-reusable.yml
    with:
      environment_name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
      foundation_web_stack_name: ogf-web-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
      web_api_stack_name: ogf-web-api-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
      okra_stack_name: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && 'ogf-okra-prod' || 'ogf-okra-staging' }}
      grn_stack_name: ogf-grn-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
      aws_region: us-east-1
      aws_role_session_name: GitHubActions-FoundationWeb-Deploy
      domain_name: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && vars.FOUNDATION_WEB_DOMAIN_NAME_PROD || vars.FOUNDATION_WEB_DOMAIN_NAME_STAGING || '' }}
      domain_hosted_zone_id: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_PROD || vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_STAGING || '' }}
      stripe_event_bus_name: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && vars.STRIPE_EVENT_BUS_NAME_PROD || vars.STRIPE_EVENT_BUS_NAME_STAGING || '' }}
      stripe_publishable_key: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && vars.STRIPE_PUBLISHABLE_KEY_PROD || vars.STRIPE_PUBLISHABLE_KEY_STAGING || '' }}
    secrets:
      aws_role_arn: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && secrets.AWS_PROD_ROLE_ARN || secrets.AWS_STAGING_ROLE_ARN }}
      database_url: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}
      signup_slack_webhook_url: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_PROD || secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}
      web_stripe_secret_key: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && secrets.STRIPE_SECRET_KEY_PROD || secrets.STRIPE_SECRET_KEY_STAGING }}
      web_donation_slack_webhook_url: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_PROD || secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}

  deployment-summary:
    name: Foundation Web Deployment Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy]

    steps:
      - name: Print deployment summary
        run: |
          echo "=========================================="
          echo "Foundation Web Deployment Summary"
          echo "=========================================="
          echo "Environment: ${{ env.DEPLOY_ENVIRONMENT }}"
          echo "Stack Name: ${{ env.FOUNDATION_WEB_STACK_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo ""
          echo "Frontend URL: ${{ needs.deploy.outputs.frontend-url }}"
          echo "Web API URL: ${{ needs.deploy.outputs.web-api-url }}"
          echo "=========================================="

          if [ "${{ needs.deploy.result }}" != "success" ]; then
            echo "Deployment failed"
            exit 1
          fi
          echo "Deployment successful"
