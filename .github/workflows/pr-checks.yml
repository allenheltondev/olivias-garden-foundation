  staging-validation-summary:
    name: Staging Validation Summary
    runs-on: ubuntu-latest
    needs:
      - deploy-staging-backend
      - deploy-staging-frontend
      - staging-public-api-smoke
      - contract-api-tests
      - utility-api-tests
      - e2e-api-tests
    if: always() && github.event.action != 'closed'

    steps:
      - name: Check staging validation jobs
        run: |
          check_result() {
            local job_name="$1"
            local result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$job_name failed with result: $result"
              exit 1
            fi
          }

          check_result "deploy-staging-backend" "${{ needs.deploy-staging-backend.result }}"
          check_result "deploy-staging-frontend" "${{ needs.deploy-staging-frontend.result }}"
          check_result "staging-public-api-smoke" "${{ needs.staging-public-api-smoke.result }}"
          check_result "contract-api-tests" "${{ needs.contract-api-tests.result }}"
          check_result "utility-api-tests" "${{ needs.utility-api-tests.result }}"
          check_result "e2e-api-tests" "${{ needs.e2e-api-tests.result }}"

          echo "Staging validation passed"

  cleanup-staging:
    name: Cleanup Staging Environment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    env:
      AWS_REGION: us-east-1
      STACK_NAME: community-garden-staging-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          role-session-name: GitHubActions-Cleanup-PR-${{ github.event.pull_request.number }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Empty frontend bucket
        run: |
          if ! aws cloudformation describe-stacks --stack-name ${{ env.STACK_NAME }} --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "Stack ${{ env.STACK_NAME }} does not exist, nothing to clean up"
            exit 0
          fi

          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucket'].OutputValue" \
            --output text)

          if [ -z "$FRONTEND_BUCKET" ] || [ "$FRONTEND_BUCKET" = "None" ]; then
            echo "No FrontendBucket output found; skipping bucket cleanup"
            exit 0
          fi

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

          echo "Emptying s3://$FRONTEND_BUCKET ..."
          aws s3 rm "s3://$FRONTEND_BUCKET" --recursive || true

          while true; do
            VERSIONS_JSON=$(aws s3api list-object-versions --bucket "$FRONTEND_BUCKET" --output json)
            VERSION_COUNT=$(echo "$VERSIONS_JSON" | jq '[.Versions[]?, .DeleteMarkers[]?] | length')

            if [ "$VERSION_COUNT" -eq 0 ]; then
              break
            fi

            DELETE_PAYLOAD=$(echo "$VERSIONS_JSON" | jq '{Objects: ([.Versions[]? | {Key, VersionId}] + [.DeleteMarkers[]? | {Key, VersionId}]), Quiet: true}')
            echo "$DELETE_PAYLOAD" > /tmp/delete-objects.json
            aws s3api delete-objects --bucket "$FRONTEND_BUCKET" --delete file:///tmp/delete-objects.json >/dev/null
          done

          echo "Frontend bucket is empty"

      - name: Delete CloudFormation stack
        run: |
          if aws cloudformation describe-stacks --stack-name ${{ env.STACK_NAME }} --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "Deleting stack ${{ env.STACK_NAME }}..."
            aws cloudformation delete-stack --stack-name ${{ env.STACK_NAME }} --region ${{ env.AWS_REGION }}
            echo "Stack deletion initiated"
          else
            echo "Stack ${{ env.STACK_NAME }} does not exist, nothing to clean up"
          fi

