name: Foundation Web PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'infra/foundation-web/**'
      - '.github/workflows/web-*.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'tsconfig.base.json'

permissions:
  contents: read

concurrency:
  group: foundation-web-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  template-validate:
    name: Foundation Web Template Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Validate root template
        run: cfn-lint infra/foundation-web/template.yaml

  web-typecheck:
    name: Foundation Web Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm --workspace @olivias/web run typecheck

  web-build:
    name: Foundation Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build foundation web app
        run: npm --workspace @olivias/web run build

  foundation-functions-test:
    name: Foundation Web Function Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: infra/foundation-web/package-lock.json

      - name: Install foundation infrastructure dependencies
        working-directory: infra/foundation-web
        run: npm ci --ignore-scripts

      - name: Run foundation function tests
        working-directory: infra/foundation-web
        run: npm test

  ci-summary:
    name: Foundation Web CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - template-validate
      - web-typecheck
      - web-build
      - foundation-functions-test

    steps:
      - name: Check workflow results
        run: |
          check_result() {
            local job_name="$1"
            local result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$job_name failed with result: $result"
              exit 1
            fi
          }

          check_result "template-validate" "${{ needs.template-validate.result }}"
          check_result "web-typecheck" "${{ needs.web-typecheck.result }}"
          check_result "web-build" "${{ needs.web-build.result }}"
          check_result "foundation-functions-test" "${{ needs.foundation-functions-test.result }}"

          echo "Foundation web PR checks passed"
