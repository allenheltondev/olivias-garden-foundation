name: Foundation Web PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'infra/foundation-web/**'
      - '.github/workflows/web-*.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'tsconfig.base.json'

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: foundation-web-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  FOUNDATION_WEB_STACK_NAME: ogf-web-staging
  OKRA_STACK_NAME: ogf-okra-staging
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  template-validate:
    name: Foundation Web Template Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Validate root template
        run: cfn-lint infra/foundation-web/template.yaml

  web-typecheck:
    name: Foundation Web Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm --workspace @olivias/web run typecheck

  web-build:
    name: Foundation Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build foundation web app
        run: npm --workspace @olivias/web run build

  deploy-staging:
    name: Foundation Web Staging Deploy
    needs: [template-validate, web-typecheck, web-build]
    if: github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/foundation-web-deploy-reusable.yml
    with:
      environment_name: staging
      foundation_web_stack_name: ${{ env.FOUNDATION_WEB_STACK_NAME }}
      okra_stack_name: ${{ env.OKRA_STACK_NAME }}
      grn_stack_name: ogf-grn-staging
      aws_region: ${{ env.AWS_REGION }}
      aws_role_session_name: GitHubActions-FoundationWeb-PR-${{ github.event.pull_request.number }}
      domain_name: ${{ vars.FOUNDATION_WEB_DOMAIN_NAME_STAGING || '' }}
      domain_hosted_zone_id: ${{ vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_STAGING || '' }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_STAGING_ROLE_ARN }}
      database_url: ${{ secrets.DATABASE_URL_STAGING }}

  comment-staging:
    name: Comment Foundation Web Staging URL
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: always() && needs.deploy-staging.result == 'success'

    steps:
      - name: Comment on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Foundation Web Staging Deployment

            **Stack:** \`${process.env.STACK_NAME}\`
            **Frontend URL:** ${{ needs.deploy-staging.outputs.frontend-url }}

            This PR updated the shared foundation web staging environment.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
        env:
          STACK_NAME: ${{ env.FOUNDATION_WEB_STACK_NAME }}

  ci-summary:
    name: Foundation Web CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - template-validate
      - web-typecheck
      - web-build
      - deploy-staging

    steps:
      - name: Check workflow results
        run: |
          check_result() {
            local job_name="$1"
            local result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$job_name failed with result: $result"
              exit 1
            fi
          }

          check_result "template-validate" "${{ needs.template-validate.result }}"
          check_result "web-typecheck" "${{ needs.web-typecheck.result }}"
          check_result "web-build" "${{ needs.web-build.result }}"
          check_result "deploy-staging" "${{ needs.deploy-staging.result }}"

          echo "Foundation web PR checks passed"
