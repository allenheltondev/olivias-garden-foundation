name: Foundation Web PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'apps/web/**'
      - 'services/web-api/**'
      - 'packages/ui/**'
      - 'infra/foundation-web/**'
      - '.github/workflows/web-*.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'tsconfig.base.json'

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: foundation-web-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  template-validate:
    name: Foundation Web Template Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Validate root template
        run: cfn-lint infra/foundation-web/template.yaml

      - name: Validate web-api template
        run: cfn-lint services/web-api/template.yaml

  web-typecheck:
    name: Foundation Web Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm --workspace @olivias/web run typecheck

  web-build:
    name: Foundation Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build foundation web app
        run: npm --workspace @olivias/web run build

  foundation-functions-test:
    name: Foundation Web Function Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: infra/foundation-web/package-lock.json

      - name: Install foundation infrastructure dependencies
        working-directory: infra/foundation-web
        run: npm ci --ignore-scripts

      - name: Run foundation function tests
        working-directory: infra/foundation-web
        run: npm test

  web-api-checks:
    name: Web API Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm --workspace @olivias/web-api run typecheck

      - name: Run lint
        run: npm --workspace @olivias/web-api run lint

      - name: Run tests
        run: npm --workspace @olivias/web-api run test

  ci-summary:
    name: Foundation Web CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - template-validate
      - web-typecheck
      - web-build
      - foundation-functions-test
      - web-api-checks

    steps:
      - name: Check workflow results
        run: |
          check_result() {
            local job_name="$1"
            local result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$job_name failed with result: $result"
              exit 1
            fi
          }

          check_result "template-validate" "${{ needs.template-validate.result }}"
          check_result "web-typecheck" "${{ needs.web-typecheck.result }}"
          check_result "web-build" "${{ needs.web-build.result }}"
          check_result "foundation-functions-test" "${{ needs.foundation-functions-test.result }}"
          check_result "web-api-checks" "${{ needs.web-api-checks.result }}"

          echo "Foundation web PR checks passed"

  deploy:
    name: Deploy Foundation Web PR Preview
    needs: [ci-summary]
    uses: ./.github/workflows/foundation-web-deploy-reusable.yml
    with:
      environment_name: staging
      foundation_web_stack_name: ogf-web-staging
      web_api_stack_name: ogf-web-api-staging
      okra_stack_name: ogf-okra-staging
      grn_stack_name: ogf-grn-staging
      aws_region: us-east-1
      aws_role_session_name: GitHubActions-FoundationWeb-PR-${{ github.event.pull_request.number }}
      domain_name: ${{ vars.FOUNDATION_WEB_DOMAIN_NAME_STAGING || '' }}
      domain_hosted_zone_id: ${{ vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_STAGING || '' }}
      stripe_event_bus_name: ${{ vars.STRIPE_EVENT_BUS_NAME_STAGING || '' }}
      stripe_publishable_key: ${{ vars.STRIPE_PUBLISHABLE_KEY_STAGING || '' }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_STAGING_ROLE_ARN }}
      database_url: ${{ secrets.DATABASE_URL_STAGING }}
      signup_slack_webhook_url: ${{ secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}
      web_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY_STAGING }}
      web_donation_slack_webhook_url: ${{ secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}

  deployment-comment:
    name: Comment Foundation Web PR Preview
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && needs.deploy.result == 'success'

    steps:
      - name: Comment on PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const body = `#### Foundation Web PR Preview Ready

            **Environment:** \`staging\`
            **Frontend URL:** ${{ needs.deploy.outputs.frontend-url }}
            **Web API URL:** ${{ needs.deploy.outputs.web-api-url }}

            This deploy publishes the current PR's \`apps/web\` assets and \`services/web-api\` changes to the shared foundation staging stack.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
