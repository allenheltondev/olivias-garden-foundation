name: Foundation Web PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'apps/web/**'
      - 'services/web-api/**'
      - 'packages/ui/**'
      - 'infra/foundation-web/**'
      - 'apps/web/playwright.config.ts'
      - 'apps/web/tests/**'
      - '.github/workflows/web-*.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'tsconfig.base.json'

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: foundation-web-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  template-validate:
    name: Foundation Web Template Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Install esbuild for SAM
        run: npm install -g esbuild

      - name: Install workspace dependencies
        run: npm ci

      - name: Install foundation infrastructure dependencies
        working-directory: infra/foundation-web
        run: npm ci --ignore-scripts

      - name: Install foundation function dependencies
        working-directory: infra/foundation-web/functions
        run: npm ci --ignore-scripts

      - name: Build root template
        run: sam build --template-file infra/foundation-web/template.yaml --build-dir infra/foundation-web/.aws-sam/build

      - name: Build web-api template
        run: sam build --template-file services/web-api/template.yaml --build-dir services/web-api/.aws-sam/build

      - name: Upload web-api SAM build artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundation-web-api-sam-build
          path: services/web-api/.aws-sam/build
          if-no-files-found: error

  web-typecheck:
    name: Foundation Web Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm --workspace @olivias/web run typecheck

  web-build:
    name: Foundation Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build foundation web app
        run: npm --workspace @olivias/web run build

  foundation-functions-test:
    name: Foundation Web Function Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            infra/foundation-web/package-lock.json
            infra/foundation-web/functions/package-lock.json

      - name: Install foundation infrastructure dependencies
        working-directory: infra/foundation-web
        run: npm ci --ignore-scripts

      - name: Install foundation function dependencies
        working-directory: infra/foundation-web/functions
        run: npm ci --ignore-scripts

      - name: Run foundation function tests
        working-directory: infra/foundation-web
        run: npm test

  web-api-checks:
    name: Web API Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm --workspace @olivias/web-api run typecheck

      - name: Run lint
        run: npm --workspace @olivias/web-api run lint

      - name: Run tests
        run: npm --workspace @olivias/web-api run test

  ci-summary:
    name: Foundation Web CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - template-validate
      - web-typecheck
      - web-build
      - foundation-functions-test
      - web-api-checks

    steps:
      - name: Check workflow results
        run: |
          check_result() {
            local job_name="$1"
            local result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$job_name failed with result: $result"
              exit 1
            fi
          }

          check_result "template-validate" "${{ needs.template-validate.result }}"
          check_result "web-typecheck" "${{ needs.web-typecheck.result }}"
          check_result "web-build" "${{ needs.web-build.result }}"
          check_result "foundation-functions-test" "${{ needs.foundation-functions-test.result }}"
          check_result "web-api-checks" "${{ needs.web-api-checks.result }}"

          echo "Foundation web PR checks passed"

  deploy:
    name: Deploy Foundation Web PR Preview
    needs: [ci-summary]
    uses: ./.github/workflows/foundation-web-deploy-reusable.yml
    with:
      environment_name: staging
      foundation_web_stack_name: ogf-web-staging
      web_api_stack_name: ogf-web-api-staging
      okra_stack_name: ogf-okra-staging
      grn_stack_name: ogf-grn-staging
      aws_region: us-east-1
      aws_role_session_name: GitHubActions-FoundationWeb-PR-${{ github.event.pull_request.number }}
      domain_name: ${{ vars.FOUNDATION_WEB_DOMAIN_NAME_STAGING || '' }}
      domain_hosted_zone_id: ${{ vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_STAGING || '' }}
      stripe_event_bus_name: ${{ vars.STRIPE_EVENT_BUS_NAME_STAGING || '' }}
      stripe_publishable_key: ${{ vars.STRIPE_PUBLISHABLE_KEY_STAGING || '' }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_STAGING_ROLE_ARN }}
      database_url: ${{ secrets.DATABASE_URL_STAGING }}
      google_oauth_client_id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_STAGING }}
      google_oauth_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET_STAGING }}
      facebook_app_id: ${{ secrets.FACEBOOK_APP_ID_STAGING }}
      facebook_app_secret: ${{ secrets.FACEBOOK_APP_SECRET_STAGING }}
      signup_slack_webhook_url: ${{ secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}
      web_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY_STAGING }}
      web_donation_slack_webhook_url: ${{ secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}

  stage-ui-tests:
    name: Foundation Web Stage UI Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success'
    outputs:
      run-url: ${{ steps.stage-ui-run.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record workflow run URL
        id: stage-ui-run
        run: echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Configure AWS credentials for screenshot publishing
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          role-session-name: GitHubActions-FoundationWeb-Screenshots-PR-${{ github.event.pull_request.number }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Stage UI suite
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.web-app-url }}
          PLAYWRIGHT_ENABLE_VISUAL_REGRESSION: 'false'
          OGF_CI_USERNAME: ${{ needs.deploy.outputs.ci-admin-username }}
          OGF_CI_PASSWORD: ${{ needs.deploy.outputs.ci-admin-password }}
        run: npm run test:e2e

      - name: Capture PR screenshots
        if: always()
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.web-app-url }}
          PLAYWRIGHT_CAPTURE_PR_SCREENSHOTS: 'true'
          PLAYWRIGHT_PR_SCREENSHOT_DIR: test-results/pr-screenshots
        run: npm run test:e2e -- tests/pr-screenshots.spec.ts --workers=1 --output=test-results/pr-screenshot-run

      - name: Publish PR screenshots to S3 and generate 7-day links
        if: always()
        id: screenshot-links
        env:
          FRONTEND_BUCKET: ${{ needs.deploy.outputs.frontend-bucket }}
          SCREENSHOT_PREFIX: pr-screenshots/pr-${{ github.event.pull_request.number }}/run-${{ github.run_id }}
        run: |
          SCREENSHOT_DIR="apps/web/test-results/pr-screenshots"
          COMMENT_FILE="$SCREENSHOT_DIR/pr-comment.md"

          mkdir -p "$SCREENSHOT_DIR"

          if [ ! -d "$SCREENSHOT_DIR" ]; then
            echo "_Stage screenshots were not generated in this run._" > "$COMMENT_FILE"
            exit 0
          fi

          declare -A LABELS=(
            ["homepage-desktop.png"]="Homepage desktop"
            ["donate-desktop.png"]="Donate desktop"
            ["homepage-mobile.png"]="Homepage mobile"
          )

          {
            echo "### Stage Screenshots"
            echo
          } > "$COMMENT_FILE"

          for file in homepage-desktop.png donate-desktop.png homepage-mobile.png; do
            SOURCE_PATH="$SCREENSHOT_DIR/$file"
            if [ ! -f "$SOURCE_PATH" ]; then
              continue
            fi

            TARGET_KEY="$SCREENSHOT_PREFIX/$file"
            aws s3 cp "$SOURCE_PATH" "s3://$FRONTEND_BUCKET/$TARGET_KEY" \
              --content-type "image/png" \
              --cache-control "private, max-age=0, no-store"

            PRESIGNED_URL=$(aws s3 presign "s3://$FRONTEND_BUCKET/$TARGET_KEY" --expires-in 604800)

            {
              echo "**${LABELS[$file]}**"
              echo
              echo "![${LABELS[$file]}]($PRESIGNED_URL)"
              echo
            } >> "$COMMENT_FILE"
          done

      - name: Comment on PR with preview URL and screenshots
        if: always()
        uses: actions/github-script@v7
        env:
          WEB_APP_URL: ${{ needs.deploy.outputs.web-app-url }}
          WEB_API_URL: ${{ needs.deploy.outputs.web-api-url }}
          STAGE_UI_RUN_URL: ${{ steps.stage-ui-run.outputs.url }}
          STAGE_UI_RESULT: ${{ job.status }}
          COMMENT_FILE: apps/web/test-results/pr-screenshots/pr-comment.md
        with:
          script: |
            const fs = require('node:fs');
            const screenshotMarkdown = fs.existsSync(process.env.COMMENT_FILE)
              ? fs.readFileSync(process.env.COMMENT_FILE, 'utf8').trim()
              : '_Stage screenshots were not generated in this run._';

            const body = `#### Foundation Web PR Preview Ready

            **Environment:** \`staging\`
            **Web App URL:** ${process.env.WEB_APP_URL}
            **Web API URL:** ${process.env.WEB_API_URL}
            **Stage UI run:** ${process.env.STAGE_UI_RUN_URL}
            **Screenshot artifact:** \`foundation-web-playwright-screenshots\`
            **Stage UI result:** \`${process.env.STAGE_UI_RESULT}\`

            This deploy publishes the current PR's \`apps/web\` assets and \`services/web-api\` changes to the shared foundation staging stack. The inline screenshot links below expire after 7 days.

            ${screenshotMarkdown}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Publish screenshot summary
        if: always()
        run: |
          {
            echo "## Foundation Web UI Artifacts"
            echo
            echo "- Workflow run: ${{ steps.stage-ui-run.outputs.url }}"
            echo "- Screenshot artifact: \`foundation-web-playwright-screenshots\`"
            echo "- Screenshot links expire after: 7 days"
            echo "- Debug artifact: \`foundation-web-playwright-report\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-web-playwright-screenshots
          path: apps/web/test-results
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-web-playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
