          VITE_USER_POOL_CLIENT_ID=${{ needs.deploy-admin-backend.outputs.user-pool-client-id }}
          VITE_USER_POOL_DOMAIN=${{ needs.deploy-admin-backend.outputs.user-pool-domain }}
          VITE_ADMIN_API_URL=${{ needs.deploy-admin-backend.outputs.api-url }}
          VITE_OKRA_ADMIN_API_URL=${{ needs.deploy-okra-backend.outputs.admin-api-url }}
          VITE_AWS_REGION=${{ env.AWS_REGION }}
          VITE_FOUNDATION_URL=${{ steps.get-foundation-url.outputs.url }}
          VITE_GRN_URL=${{ needs.deploy-backend.outputs.frontend-url }}
          EOF

      - name: Build admin frontend
        run: npm --workspace @olivias/admin run build

      - name: Deploy admin frontend to S3
        run: |
          aws s3 sync apps/admin/dist/ "s3://${{ needs.deploy-admin-backend.outputs.frontend-bucket }}/" \
            --region ${{ env.AWS_REGION }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "manifest.json"

          aws s3 cp apps/admin/dist/index.html "s3://${{ needs.deploy-admin-backend.outputs.frontend-bucket }}/index.html" \
            --region ${{ env.AWS_REGION }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          if [ -f "apps/admin/dist/manifest.json" ]; then
            aws s3 cp apps/admin/dist/manifest.json "s3://${{ needs.deploy-admin-backend.outputs.frontend-bucket }}/manifest.json" \
              --region ${{ env.AWS_REGION }} \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "application/json"
          fi

      - name: Invalidate admin CloudFront cache
        run: |
          DISTRIBUTION_ID="${{ needs.deploy-admin-backend.outputs.cloudfront-distribution-id }}"

          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
            echo "Admin CloudFront cache invalidated for distribution $DISTRIBUTION_ID"
          else
            echo "Admin CloudFront distribution ID not available"
          fi

  deploy-store-backend:
    name: Deploy Store Backend
    runs-on: ubuntu-latest
