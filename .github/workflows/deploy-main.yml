            --query "Stacks[0].Outputs[?OutputKey=='WebFrontendUrl'].OutputValue" \
            --output text)
          echo "url=$FOUNDATION_FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Create store environment file
        working-directory: apps/store
        run: |
          cat > .env << EOF
          VITE_USER_POOL_ID=${{ needs.deploy-store-backend.outputs.user-pool-id }}
          VITE_USER_POOL_CLIENT_ID=${{ needs.deploy-store-backend.outputs.user-pool-client-id }}
          VITE_AWS_REGION=${{ env.AWS_REGION }}
          VITE_STORE_API_URL=${{ needs.deploy-store-backend.outputs.api-url }}
          VITE_FOUNDATION_URL=${{ steps.get-foundation-url.outputs.url }}
          VITE_GRN_URL=${{ needs.deploy-backend.outputs.frontend-url }}
          VITE_ADMIN_URL=${{ needs.deploy-admin-backend.outputs.frontend-url }}
          EOF

      - name: Build store frontend
        run: npm --workspace @olivias/store run build

      - name: Deploy store frontend to S3
        run: |
          aws s3 sync apps/store/dist/ "s3://${{ needs.deploy-store-backend.outputs.frontend-bucket }}/" \
            --region ${{ env.AWS_REGION }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "manifest.json"

          aws s3 cp apps/store/dist/index.html "s3://${{ needs.deploy-store-backend.outputs.frontend-bucket }}/index.html" \
            --region ${{ env.AWS_REGION }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate store CloudFront cache
        run: |
          DISTRIBUTION_ID="${{ needs.deploy-store-backend.outputs.cloudfront-distribution-id }}"
          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
            echo "Store CloudFront cache invalidated for distribution $DISTRIBUTION_ID"
          else
            echo "Store CloudFront distribution ID not available"
          fi

  deployment-summary:
    name: Platform Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-admin-backend, deploy-okra-backend, deploy-store-backend, deploy-frontend, deploy-admin-frontend, deploy-store-frontend]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "=========================================="
          echo "Platform Deployment Summary"
          echo "=========================================="
          echo "Environment: ${{ env.ENVIRONMENT }}"
          echo "GRN Stack Name: ${{ env.STACK_NAME }}"
          echo "Admin Stack Name: ${{ env.ADMIN_STACK_NAME }}"
          echo "Foundation Stack Name: ${{ env.FOUNDATION_STACK_NAME }}"
          echo "Okra Stack Name: ${{ env.OKRA_STACK_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo ""
          echo "Frontend URL (apps/grn): ${{ needs.deploy-backend.outputs.frontend-url }}"
          echo "Admin URL (apps/admin): ${{ needs.deploy-admin-backend.outputs.frontend-url }}"
          echo "API URL (services/grn-api): ${{ needs.deploy-backend.outputs.api-url }}"
          echo "Admin API URL (services/admin-api): ${{ needs.deploy-admin-backend.outputs.api-url }}"
          echo "Okra API URL (services/okra-api): ${{ needs.deploy-okra-backend.outputs.api-url }}"
          echo "User Pool ID: ${{ needs.deploy-backend.outputs.user-pool-id }}"
          echo "=========================================="

          if [ "${{ needs.deploy-backend.result }}" != "success" ] || [ "${{ needs.deploy-admin-backend.result }}" != "success" ] || [ "${{ needs.deploy-okra-backend.result }}" != "success" ] || [ "${{ needs.deploy-store-backend.result }}" != "success" ] || [ "${{ needs.deploy-frontend.result }}" != "success" ] || [ "${{ needs.deploy-admin-frontend.result }}" != "success" ] || [ "${{ needs.deploy-store-frontend.result }}" != "success" ]; then
            echo "Deployment failed"
            exit 1
          fi
          echo "Deployment successful"

