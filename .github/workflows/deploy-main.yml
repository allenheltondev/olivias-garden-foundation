name: Deploy Platform to AWS

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'apps/web/**'
      - 'services/web-api/**'
      - 'infra/foundation-web/**'
      - '.github/workflows/web-*.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: grn-deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  STACK_NAME: ogf-grn-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  ADMIN_STACK_NAME: ogf-admin-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  STORE_STACK_NAME: ogf-store-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  FOUNDATION_STACK_NAME: ogf-web-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging') }}
  OKRA_STACK_NAME: ${{ (github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'staging')) == 'prod' && 'ogf-okra-prod' || 'ogf-okra-staging' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  grn-lint-and-test:
    name: GRN Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: grn_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      # Backend checks
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Install Zig toolchain
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-lambda
        uses: jaxxstorm/action-install-gh-release@v1.12.0
        with:
          repo: cargo-lambda/cargo-lambda
          tag: v1.2.1
          chmod: 0755

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            services/grn-api/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/grn-api/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run database migrations
        working-directory: services/grn-api
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/grn_test
        run: ./db/migrate.sh

      - name: Backend - Check formatting
        working-directory: services/grn-api
        run: cargo fmt --all -- --check

      - name: Backend - Run Clippy
        working-directory: services/grn-api
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Backend - Run tests
        working-directory: services/grn-api
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/grn_test
        run: cargo test --all-features

      # Frontend checks
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/grn/package-lock.json

      - name: Frontend - Install dependencies
        working-directory: apps/grn
        run: npm ci --workspaces=false

      - name: Frontend - Install shared package types
        working-directory: packages/ui
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Frontend - Run ESLint
        working-directory: apps/grn
        run: npm run lint

      - name: Frontend - Type check
        working-directory: apps/grn
        run: npm run typecheck

      # Backend Node.js function lint & tests
      - name: Backend Functions - Install lint dependencies
        working-directory: services/grn-api
        run: npm install

      - name: Backend Functions - Lint
        working-directory: services/grn-api
        run: npm run lint

      - name: Backend Functions - Run tests
        working-directory: services/grn-api
        run: npm test

  admin-lint-and-test:
    name: Admin Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install admin API dependencies
        working-directory: .
        run: npm ci --workspace services/admin-api --include-workspace-root=false --ignore-scripts

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Admin API - Run ESLint
        working-directory: .
        run: npm --workspace services/admin-api run lint

      - name: Admin API - Type check
        working-directory: .
        run: npm --workspace services/admin-api run typecheck

      - name: Admin API - Run tests
        working-directory: .
        run: npm --workspace services/admin-api run test

      - name: Admin Backend - Build
        working-directory: services/admin-api
        run: npm run build

      - name: Admin Frontend - Install workspace dependencies
        run: npm ci

      - name: Admin Frontend - Run ESLint
        run: npm --workspace @olivias/admin run lint

      - name: Admin Frontend - Type check
        run: npm --workspace @olivias/admin run typecheck

  store-lint-and-test:
    name: Store Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install store API dependencies
        run: npm ci --workspace services/store-api --include-workspace-root=false --ignore-scripts

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Store API - Run ESLint
        run: npm --workspace services/store-api run lint

      - name: Store API - Type check
        run: npm --workspace services/store-api run typecheck

      - name: Store API - Run tests
        run: npm --workspace services/store-api run test

      - name: Store Backend - Build
        working-directory: services/store-api
        run: npm run build

      - name: Store Frontend - Install workspace dependencies
        run: npm ci

      - name: Store Frontend - Run ESLint
        run: npm --workspace @olivias/store run lint

      - name: Store Frontend - Type check
        run: npm --workspace @olivias/store run typecheck

  deploy-foundation:
    name: Deploy Foundation Stack
    runs-on: ubuntu-latest
    concurrency:
      group: foundation-stack-${{ github.event.inputs.environment == 'prod' && 'ogf-web-prod' || github.event.inputs.environment == 'staging' && 'ogf-web-staging' || github.ref == 'refs/heads/main' && 'ogf-web-prod' || 'ogf-web-staging' }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_PROD_ROLE_ARN || secrets.AWS_STAGING_ROLE_ARN }}
          role-session-name: GitHubActions-Foundation-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Setup Node.js for foundation function build
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            infra/foundation-web/package-lock.json
            infra/foundation-web/functions/package-lock.json

      - name: Install esbuild for SAM
        run: npm install -g esbuild

      - name: Install foundation infrastructure dependencies
        working-directory: infra/foundation-web
        run: npm ci --ignore-scripts

      - name: Install foundation function dependencies
        working-directory: infra/foundation-web/functions
        run: npm ci --ignore-scripts

      - name: Build foundation stack
        run: sam build --template-file infra/foundation-web/template.yaml --build-dir infra/foundation-web/.aws-sam/build

      - name: Deploy foundation stack
        env:
          DOMAIN_NAME: ${{ env.ENVIRONMENT == 'prod' && vars.FOUNDATION_WEB_DOMAIN_NAME_PROD || vars.FOUNDATION_WEB_DOMAIN_NAME_STAGING || '' }}
          DOMAIN_HOSTED_ZONE_ID: ${{ env.ENVIRONMENT == 'prod' && vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_PROD || vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_STAGING || '' }}
          DATABASE_URL: ${{ env.ENVIRONMENT == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}
          SIGNUP_SLACK_WEBHOOK_URL: ${{ env.ENVIRONMENT == 'prod' && secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_PROD || secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}
        run: |
          PARAM_OVERRIDES=("EnvironmentName=${{ env.ENVIRONMENT }}" "DatabaseUrl=$DATABASE_URL")
          if [ -n "$DOMAIN_NAME" ] && [ -n "$DOMAIN_HOSTED_ZONE_ID" ]; then
            PARAM_OVERRIDES+=("DomainName=$DOMAIN_NAME" "DomainHostedZoneId=$DOMAIN_HOSTED_ZONE_ID")
          fi
          if [ -n "$SIGNUP_SLACK_WEBHOOK_URL" ]; then
            PARAM_OVERRIDES+=("SignupSlackWebhookUrl=$SIGNUP_SLACK_WEBHOOK_URL")
          fi

          sam deploy \
            --template-file infra/foundation-web/.aws-sam/build/template.yaml \
            --stack-name "${{ env.FOUNDATION_STACK_NAME }}" \
            --resolve-s3 \
            --s3-prefix "${{ env.FOUNDATION_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Diagnose failed foundation deploy
        if: ${{ failure() }}
        run: |
          echo "Foundation deploy failed. Dumping CloudFormation diagnostics for ${{ env.FOUNDATION_STACK_NAME }}."

          echo "==== describe-stacks ===="
          aws cloudformation describe-stacks \
            --stack-name "${{ env.FOUNDATION_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" || true

          echo "==== describe-stack-events (latest 50) ===="
          aws cloudformation describe-stack-events \
            --stack-name "${{ env.FOUNDATION_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackEvents[:50].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
            --output table || true

          echo "==== list-stack-resources ===="
          aws cloudformation list-stack-resources \
            --stack-name "${{ env.FOUNDATION_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackResourceSummaries[*].[LogicalResourceId,ResourceType,ResourceStatus,PhysicalResourceId]" \
            --output table || true

          echo "==== list-change-sets (latest 5) ===="
          aws cloudformation list-change-sets \
            --stack-name "${{ env.FOUNDATION_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "sort_by(Summaries,&CreationTime)[-5:].[ChangeSetName,Status,ExecutionStatus,StatusReason,CreationTime]" \
            --output table || true

          LATEST_CHANGE_SET=$(aws cloudformation list-change-sets \
            --stack-name "${{ env.FOUNDATION_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "sort_by(Summaries,&CreationTime)[-1].ChangeSetName" \
            --output text 2>/dev/null || true)

          if [ -n "$LATEST_CHANGE_SET" ] && [ "$LATEST_CHANGE_SET" != "None" ]; then
            echo "==== describe-change-set ($LATEST_CHANGE_SET) ===="
            aws cloudformation describe-change-set \
              --stack-name "${{ env.FOUNDATION_STACK_NAME }}" \
              --change-set-name "$LATEST_CHANGE_SET" \
              --region "${{ env.AWS_REGION }}" || true
          fi

  okra-lint-and-test:
    name: Okra Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/okra-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/okra-api/package-lock.json

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install dependencies
        run: npm ci --workspaces=false --ignore-scripts

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build check
        run: npm run build

  deploy-backend:
    name: Deploy GRN Backend
    runs-on: ubuntu-latest
    needs: [grn-lint-and-test, deploy-foundation]
    outputs:
      user-pool-id: ${{ steps.get-outputs.outputs.user-pool-id }}
      user-pool-client-id: ${{ steps.get-outputs.outputs.user-pool-client-id }}
      user-pool-domain: ${{ steps.get-outputs.outputs.user-pool-domain }}
      api-url: ${{ steps.get-outputs.outputs.api-url }}
      frontend-url: ${{ steps.get-outputs.outputs.frontend-url }}
      frontend-bucket: ${{ steps.get-outputs.outputs.frontend-bucket }}
      cloudfront-distribution-id: ${{ steps.get-outputs.outputs.cloudfront-distribution-id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_PROD_ROLE_ARN || secrets.AWS_STAGING_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Install Zig toolchain
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-lambda
        uses: jaxxstorm/action-install-gh-release@v1.12.0
        with:
          repo: cargo-lambda/cargo-lambda
          tag: v1.2.1
          chmod: 0755

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            services/grn-api/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/grn-api/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Generate samconfig.toml from template
        working-directory: services/grn-api
        env:
          DATABASE_URL: ${{ env.ENVIRONMENT == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}
          DOMAIN_HOSTED_ZONE_ID: ${{ env.ENVIRONMENT == 'prod' && vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_PROD || vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_STAGING || '' }}
          FOUNDATION_DOMAIN_NAME: ${{ env.ENVIRONMENT == 'prod' && vars.FOUNDATION_WEB_DOMAIN_NAME_PROD || vars.FOUNDATION_WEB_DOMAIN_NAME_STAGING || '' }}
        run: |
          validate_domain_name() {
            local value="$1"
            local label="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            if [[ "$value" != "${value#"${value%%[![:space:]]*}"}" || "$value" != "${value%"${value##*[![:space:]]}"}" ]]; then
              echo "$label must not contain leading or trailing whitespace: [$value]" >&2
              exit 1
            fi
            if [[ "$value" == *'"'* || "$value" == *"'"* ]]; then
              echo "$label must not contain quotes: $value" >&2
              exit 1
            fi
            if [[ "$value" == *"://"* || "$value" == */* || "$value" == *":"* ]]; then
              echo "$label must be a bare hostname, not a URL: $value" >&2
              exit 1
            fi
            if [[ ! "$value" =~ ^(\*\.)?([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])$ ]]; then
              echo "$label is not a valid hostname for ACM: $value" >&2
              exit 1
            fi
          }
          validate_domain_name "$FOUNDATION_DOMAIN_NAME" "Foundation domain"
          ESCAPED_DATABASE_URL=$(printf '%s' "$DATABASE_URL" | sed 's/[&|]/\\&/g')
          DOMAIN_NAME=""
          if [ -n "$DOMAIN_HOSTED_ZONE_ID" ] && [ -n "$FOUNDATION_DOMAIN_NAME" ]; then
            DOMAIN_NAME="$FOUNDATION_DOMAIN_NAME"
          fi
          sed -e "s|{{STACK_NAME}}|${{ env.STACK_NAME }}|g" \
              -e "s|{{REGION}}|${{ env.AWS_REGION }}|g" \
              -e "s|{{DATABASE_URL}}|${ESCAPED_DATABASE_URL}|g" \
              -e "s|{{ENVIRONMENT_NAME}}|${{ env.ENVIRONMENT }}|g" \
              -e "s|{{DOMAIN_HOSTED_ZONE_ID}}|${DOMAIN_HOSTED_ZONE_ID}|g" \
              -e "s|{{DOMAIN_NAME}}|${DOMAIN_NAME}|g" \
              samconfig.template.toml > samconfig.toml
          if [ -z "$DOMAIN_HOSTED_ZONE_ID" ]; then
            sed -i '/"DomainHostedZoneId="/d' samconfig.toml
          fi
          if [ -z "$DOMAIN_NAME" ]; then
            sed -i '/"DomainName="/d' samconfig.toml
          fi
          echo "Generated samconfig.toml for CI"

      - name: Run database migrations
        run: |
          DATABASE_URL="${{ env.ENVIRONMENT == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}"
          export DATABASE_URL
          cd services/grn-api
          ./db/migrate.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Install backend Node.js dependencies
        working-directory: services/grn-api
        run: npm install

      - name: Deploy backend
        run: |
          node scripts/deploy-and-configure.mjs \
            --region ${{ env.AWS_REGION }} \
            --stack-name ${{ env.STACK_NAME }} \
            --ci
        env:
          SAM_CLI_TELEMETRY: "0"

      - name: Get stack outputs
        id: get-outputs
        run: |
          USER_POOL_ID=$(aws cloudformation list-exports \
            --region ${{ env.AWS_REGION }} \
            --query "Exports[?Name=='OGF-UserPoolId'].Value | [0]" \
            --output text)

          USER_POOL_CLIENT_ID=$(aws cloudformation list-exports \
            --region ${{ env.AWS_REGION }} \
            --query "Exports[?Name=='OGF-UserPoolClientId'].Value | [0]" \
            --output text)

          USER_POOL_DOMAIN=$(aws cloudformation list-exports \
            --region ${{ env.AWS_REGION }} \
            --query "Exports[?Name=='OGF-UserPoolDomain'].Value | [0]" \
            --output text)

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)

          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucket'].OutputValue" \
            --output text)

          CLOUDFRONT_DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "user-pool-domain=$USER_POOL_DOMAIN" >> $GITHUB_OUTPUT
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront-distribution-id=$CLOUDFRONT_DISTRIBUTION_ID" >> $GITHUB_OUTPUT

          echo "Stack outputs retrieved successfully"

  deploy-okra-backend:
    name: Deploy Okra Backend
    runs-on: ubuntu-latest
    needs: [okra-lint-and-test, deploy-foundation]
    outputs:
      api-url: ${{ steps.get-outputs.outputs.api-url }}
      admin-api-url: ${{ steps.get-outputs.outputs.admin-api-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_PROD_ROLE_ARN || secrets.AWS_STAGING_ROLE_ARN }}
          role-session-name: GitHubActions-Okra-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/okra-api/package-lock.json

      - name: Install esbuild globally for SAM
        run: npm install -g esbuild
        
      - name: Install Okra backend dependencies
        working-directory: services/okra-api
        run: npm ci --workspaces=false --ignore-scripts

      - name: Run okra database migrations
        working-directory: services/okra-api
        env:
          DATABASE_URL: ${{ env.ENVIRONMENT == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}
        run: npm run db:migrate

      - name: Generate CI admin credentials
        id: okra-ci-auth
        run: |
          echo "username=okra-ci-admin+${{ env.ENVIRONMENT }}@ogf.local" >> "$GITHUB_OUTPUT"
          PASSWORD=$(python -c "import secrets; print(f'OgF{secrets.token_hex(12)}!9a')")
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Deploy Okra backend
        working-directory: services/okra-api
        env:
          OKRA_DATABASE_URL: ${{ env.ENVIRONMENT == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}
          OKRA_CI_ADMIN_USERNAME: ${{ steps.okra-ci-auth.outputs.username }}
          OKRA_CI_ADMIN_PASSWORD: ${{ steps.okra-ci-auth.outputs.password }}
          FOUNDATION_DOMAIN_NAME: ${{ env.ENVIRONMENT == 'prod' && vars.FOUNDATION_WEB_DOMAIN_NAME_PROD || vars.FOUNDATION_WEB_DOMAIN_NAME_STAGING || '' }}
          SLACK_WEBHOOK_URL: ${{ env.ENVIRONMENT == 'prod' && secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_PROD || secrets.FOUNDATION_SIGNUP_SLACK_WEBHOOK_URL_STAGING }}
        run: |
          sam build
          PARAM_OVERRIDES=(
            "DatabaseUrl=$OKRA_DATABASE_URL"
            "CiAdminUsername=$OKRA_CI_ADMIN_USERNAME"
            "CiAdminPassword=$OKRA_CI_ADMIN_PASSWORD"
          )
          if [ -n "$FOUNDATION_DOMAIN_NAME" ]; then
            PARAM_OVERRIDES+=("DomainName=$FOUNDATION_DOMAIN_NAME")
          fi
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            PARAM_OVERRIDES+=("SlackWebhookUrl=$SLACK_WEBHOOK_URL")
          fi
          sam deploy \
            --stack-name "${{ env.OKRA_STACK_NAME }}" \
            --resolve-s3 \
            --s3-prefix "${{ env.OKRA_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Get Okra stack outputs
        id: get-outputs
        run: |
          OKRA_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.OKRA_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='HttpApiUrl'].OutputValue" \
            --output text)

          OKRA_ADMIN_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.OKRA_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='AdminApiUrl'].OutputValue" \
            --output text)

          echo "api-url=$OKRA_API_URL" >> $GITHUB_OUTPUT
          echo "admin-api-url=$OKRA_ADMIN_API_URL" >> $GITHUB_OUTPUT

          echo "Okra API URL: $OKRA_API_URL"
          echo "Okra Admin API URL: $OKRA_ADMIN_API_URL"

  deploy-admin-backend:
    name: Deploy Admin Backend
    runs-on: ubuntu-latest
    needs: [admin-lint-and-test, deploy-foundation]
    outputs:
      user-pool-id: ${{ steps.get-outputs.outputs.user-pool-id }}
      user-pool-client-id: ${{ steps.get-outputs.outputs.user-pool-client-id }}
      user-pool-domain: ${{ steps.get-outputs.outputs.user-pool-domain }}
      api-url: ${{ steps.get-outputs.outputs.api-url }}
      frontend-url: ${{ steps.get-outputs.outputs.frontend-url }}
      frontend-bucket: ${{ steps.get-outputs.outputs.frontend-bucket }}
      cloudfront-distribution-id: ${{ steps.get-outputs.outputs.cloudfront-distribution-id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_PROD_ROLE_ARN || secrets.AWS_STAGING_ROLE_ARN }}
          role-session-name: GitHubActions-Admin-Backend-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Setup Node.js for admin backend build
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install admin API dependencies
        working-directory: .
        run: npm ci --workspace services/admin-api --include-workspace-root=false --ignore-scripts

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Run admin database migrations
        run: |
          DATABASE_URL="${{ env.ENVIRONMENT == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}"
          export DATABASE_URL
          cd services/admin-api
          chmod +x ./db/migrate.sh
          ./db/migrate.sh

      - name: Build admin backend
        run: sam build --template-file services/admin-api/template.yaml --build-dir services/admin-api/.aws-sam/build

      - name: Deploy admin backend
        env:
          DATABASE_URL: ${{ env.ENVIRONMENT == 'prod' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}
          DOMAIN_HOSTED_ZONE_ID: ${{ env.ENVIRONMENT == 'prod' && vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_PROD || vars.FOUNDATION_WEB_DOMAIN_HOSTED_ZONE_ID_STAGING || '' }}
          FOUNDATION_DOMAIN_NAME: ${{ env.ENVIRONMENT == 'prod' && vars.FOUNDATION_WEB_DOMAIN_NAME_PROD || vars.FOUNDATION_WEB_DOMAIN_NAME_STAGING || '' }}
          STRIPE_SECRET_KEY: ${{ env.ENVIRONMENT == 'prod' && secrets.STRIPE_SECRET_KEY_PROD || secrets.STRIPE_SECRET_KEY_STAGING || '' }}
        run: |
          if [ -n "$FOUNDATION_DOMAIN_NAME" ]; then
            if [[ "$FOUNDATION_DOMAIN_NAME" != "${FOUNDATION_DOMAIN_NAME#"${FOUNDATION_DOMAIN_NAME%%[![:space:]]*}"}" || "$FOUNDATION_DOMAIN_NAME" != "${FOUNDATION_DOMAIN_NAME%"${FOUNDATION_DOMAIN_NAME##*[![:space:]]}"}" ]]; then
              echo "Foundation domain must not contain leading or trailing whitespace: [$FOUNDATION_DOMAIN_NAME]" >&2
              exit 1
            fi
            if [[ "$FOUNDATION_DOMAIN_NAME" == *'"'* || "$FOUNDATION_DOMAIN_NAME" == *"'"* ]]; then
              echo "Foundation domain must not contain quotes: $FOUNDATION_DOMAIN_NAME" >&2
              exit 1
            fi
            if [[ "$FOUNDATION_DOMAIN_NAME" == *"://"* || "$FOUNDATION_DOMAIN_NAME" == */* || "$FOUNDATION_DOMAIN_NAME" == *":"* ]]; then
              echo "Foundation domain must be a bare hostname, not a URL: $FOUNDATION_DOMAIN_NAME" >&2
              exit 1
            fi
            if [[ ! "$FOUNDATION_DOMAIN_NAME" =~ ^(\*\.)?([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])$ ]]; then
              echo "Foundation domain is not a valid hostname for AWS: $FOUNDATION_DOMAIN_NAME" >&2
              exit 1
            fi
          fi
          PARAM_OVERRIDES=(
            "DatabaseUrl=$DATABASE_URL"
            "EnvironmentName=${{ env.ENVIRONMENT }}"
          )
          if [ -n "$DOMAIN_HOSTED_ZONE_ID" ]; then
            PARAM_OVERRIDES+=("DomainHostedZoneId=$DOMAIN_HOSTED_ZONE_ID")
          fi
          if [ -n "$FOUNDATION_DOMAIN_NAME" ] && [ -n "$DOMAIN_HOSTED_ZONE_ID" ]; then
            PARAM_OVERRIDES+=("DomainName=$FOUNDATION_DOMAIN_NAME")
          fi
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            PARAM_OVERRIDES+=("StripeSecretKey=$STRIPE_SECRET_KEY")
          fi
          # Deploy the BUILT template (esbuild output) — --template-file
          # pointed at the source template skips the esbuild artifact and
          # packages the entire services/admin-api dir (including
          # node_modules). Explicit path avoids any implicit CWD coupling
          # between the build and deploy steps.
          sam deploy \
            --template-file services/admin-api/.aws-sam/build/template.yaml \
            --stack-name "${{ env.ADMIN_STACK_NAME }}" \
            --resolve-s3 \
            --s3-prefix "${{ env.ADMIN_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Get admin stack outputs
        id: get-outputs
        run: |
          USER_POOL_ID=$(aws cloudformation list-exports \
            --region ${{ env.AWS_REGION }} \
            --query "Exports[?Name=='OGF-UserPoolId'].Value | [0]" \
            --output text)

          USER_POOL_CLIENT_ID=$(aws cloudformation list-exports \
            --region ${{ env.AWS_REGION }} \
            --query "Exports[?Name=='OGF-UserPoolClientId'].Value | [0]" \
            --output text)

          USER_POOL_DOMAIN=$(aws cloudformation list-exports \
            --region ${{ env.AWS_REGION }} \
            --query "Exports[?Name=='OGF-UserPoolDomain'].Value | [0]" \
            --output text)

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.ADMIN_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.ADMIN_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)

          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.ADMIN_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucket'].OutputValue" \
            --output text)

          CLOUDFRONT_DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.ADMIN_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "user-pool-domain=$USER_POOL_DOMAIN" >> $GITHUB_OUTPUT
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront-distribution-id=$CLOUDFRONT_DISTRIBUTION_ID" >> $GITHUB_OUTPUT

  deploy-frontend:
    name: Deploy GRN Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_PROD_ROLE_ARN || secrets.AWS_STAGING_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/grn/package-lock.json

      - name: Install dependencies
        working-directory: apps/grn
        run: npm ci --workspaces=false

      - name: Install shared package types
        working-directory: packages/ui
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Get foundation web frontend URL
        id: get-foundation-url
        run: |
          FOUNDATION_FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.FOUNDATION_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebFrontendUrl'].OutputValue" \
            --output text)
          echo "url=$FOUNDATION_FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Create environment file
        working-directory: apps/grn
        run: |
          cat > .env << EOF
          VITE_USER_POOL_ID=${{ needs.deploy-backend.outputs.user-pool-id }}
          VITE_USER_POOL_CLIENT_ID=${{ needs.deploy-backend.outputs.user-pool-client-id }}
          VITE_USER_POOL_DOMAIN=${{ needs.deploy-backend.outputs.user-pool-domain }}
          VITE_API_URL=${{ needs.deploy-backend.outputs.api-url }}
          VITE_FRONTEND_URL=${{ needs.deploy-backend.outputs.frontend-url }}
          VITE_AWS_REGION=${{ env.AWS_REGION }}
          VITE_FOUNDATION_URL=${{ steps.get-foundation-url.outputs.url }}
          EOF

          echo "Environment file created"

      - name: Build frontend
        working-directory: apps/grn
        run: npm run build

      - name: Deploy to S3
        run: |
          # Sync all files except index.html and manifest.json with long cache
          aws s3 sync apps/grn/dist/ "s3://${{ needs.deploy-backend.outputs.frontend-bucket }}/" \
            --region ${{ env.AWS_REGION }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "manifest.json"

          # Upload index.html with no-cache
          aws s3 cp apps/grn/dist/index.html "s3://${{ needs.deploy-backend.outputs.frontend-bucket }}/index.html" \
            --region ${{ env.AWS_REGION }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          # Upload manifest.json with no-cache if it exists
          if [ -f "apps/grn/dist/manifest.json" ]; then
            aws s3 cp apps/grn/dist/manifest.json "s3://${{ needs.deploy-backend.outputs.frontend-bucket }}/manifest.json" \
              --region ${{ env.AWS_REGION }} \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "application/json"
          fi

          echo "Frontend deployed to S3"

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID="${{ needs.deploy-backend.outputs.cloudfront-distribution-id }}"

          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
            echo "CloudFront cache invalidated for distribution $DISTRIBUTION_ID"
          else
            echo "CloudFront distribution ID not available"
          fi

  deploy-admin-frontend:
    name: Deploy Admin Frontend
    runs-on: ubuntu-latest
    needs: [deploy-admin-backend, deploy-okra-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
