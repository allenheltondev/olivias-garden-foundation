name: Staging Stack Cleanup

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '27 9 * * *' # daily UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  cleanup-closed-pr-stack:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && (secrets.AWS_ROLE_TO_ASSUME != '' || secrets.AWS_DEPLOY_ROLE_TO_ASSUME != '')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Delete staging stack for closed PR
        shell: bash
        run: |
          set -euo pipefail
          STACK_NAME="community-garden-staging-pr-${{ github.event.pull_request.number }}"
          echo "Checking stack: $STACK_NAME"

          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || true)

          if [[ -z "$STATUS" || "$STATUS" == "None" ]]; then
            echo "Stack does not exist. Nothing to delete."
            exit 0
          fi

          if [[ "$STATUS" == "DELETE_COMPLETE" ]]; then
            echo "Stack already deleted."
            exit 0
          fi

          # Empty frontend bucket first to avoid DELETE_FAILED on bucket not empty.
          FRONTEND_BUCKET=$(aws cloudformation describe-stack-resource \
            --stack-name "$STACK_NAME" \
            --logical-resource-id FrontendBucket \
            --query 'StackResourceDetail.PhysicalResourceId' \
            --output text 2>/dev/null || true)

          if [[ -n "${FRONTEND_BUCKET}" && "${FRONTEND_BUCKET}" != "None" ]]; then
            echo "Emptying FrontendBucket: ${FRONTEND_BUCKET}"
            aws s3 rm "s3://${FRONTEND_BUCKET}" --recursive || true
          fi

          echo "Deleting stack in status: $STATUS"
          aws cloudformation delete-stack --stack-name "$STACK_NAME"
          aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" || true
          
          # Delete CloudWatch log groups for Lambda functions
          echo "Deleting CloudWatch log groups for $STACK_NAME"
          aws logs describe-log-groups \
            --log-group-name-prefix "/aws/lambda/$STACK_NAME" \
            --query 'logGroups[].logGroupName' \
            --output text | tr '\t' '\n' | while read -r log_group; do
              if [[ -n "$log_group" ]]; then
                echo "Deleting log group: $log_group"
                aws logs delete-log-group --log-group-name "$log_group" || true
              fi
            done
          
          echo "Cleanup request submitted for $STACK_NAME"
  nightly-prune-orphan-pr-stacks:
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && (secrets.AWS_ROLE_TO_ASSUME != '' || secrets.AWS_DEPLOY_ROLE_TO_ASSUME != '')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Get open PR numbers
        id: open_prs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const numbers = pulls.map(p => String(p.number));
            core.setOutput('numbers_csv', numbers.join(','));

      - name: Delete orphan staging PR stacks
        shell: bash
        env:
          OPEN_PRS_CSV: ${{ steps.open_prs.outputs.numbers_csv }}
        run: |
          set -euo pipefail

          echo "Open PRs: ${OPEN_PRS_CSV:-<none>}"

          aws cloudformation list-stacks \
            --query "StackSummaries[?starts_with(StackName, 'community-garden-staging-pr-')].StackName" \
            --output text | tr '\t' '\n' > stacks.txt || true

          if [[ ! -s stacks.txt ]]; then
            echo "No staging PR stacks found."
            exit 0
          fi

          should_keep() {
            local pr_num="$1"
            [[ ",${OPEN_PRS_CSV}," == *",${pr_num},"* ]]
          }

          while read -r stack; do
            [[ -z "$stack" ]] && continue
            pr_num="${stack##community-garden-staging-pr-}"

            if should_keep "$pr_num"; then
              echo "Keeping active PR stack: $stack"
              continue
            fi

            FRONTEND_BUCKET=$(aws cloudformation describe-stack-resource \
              --stack-name "$stack" \
              --logical-resource-id FrontendBucket \
              --query 'StackResourceDetail.PhysicalResourceId' \
              --output text 2>/dev/null || true)

            if [[ -n "${FRONTEND_BUCKET}" && "${FRONTEND_BUCKET}" != "None" ]]; then
              echo "Emptying FrontendBucket for orphan stack ${stack}: ${FRONTEND_BUCKET}"
              aws s3 rm "s3://${FRONTEND_BUCKET}" --recursive || true
            fi

            echo "Deleting orphan stack: $stack"
            aws cloudformation delete-stack --stack-name "$stack" || true
            
            # Delete CloudWatch log groups for Lambda functions
            echo "Deleting CloudWatch log groups for $stack"
            aws logs describe-log-groups \
              --log-group-name-prefix "/aws/lambda/$stack" \
              --query 'logGroups[].logGroupName' \
              --output text | tr '\t' '\n' | while read -r log_group; do
                if [[ -n "$log_group" ]]; then
                  echo "Deleting log group: $log_group"
                  aws logs delete-log-group --log-group-name "$log_group" || true
                fi
              done
          done < stacks.txt

          echo "Orphan cleanup pass complete."
